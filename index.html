<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #fatherName, .utr-field { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }

        /* Neon RGB Box */
        .neon-box { position: relative; padding: 4px; border-radius: 15px; background: #000; overflow: hidden; margin-bottom: 20px; }
        .neon-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 3s linear infinite;
        }
        .inner-box { position: relative; background: #fff; border-radius: 11px; padding: 15px; z-index: 1; }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }

        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 20px; background: rgba(0, 128, 0, 0.98); }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="location.reload()">🏠</button>
    </div>

    <div id="successOverlay" class="overlay">
        <h1 style="font-size: 40px;">😊</h1>
        <h1 style="font-size: 30px;">Congratulations!</h1>
        <p>Receipt Download ho rahi hai...</p>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-size:12px; font-weight:bold; margin-top:5px;">PAY ₹120</p>
            </div>

            <input type="text" id="promoInput" placeholder="PROMO CODE" style="width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; text-transform:uppercase;">
            <button class="btn" style="background:#555; padding:8px; margin-bottom:15px; font-size:14px;" onclick="applyPromo()">APPLY CODE</button>

            <input type="text" id="fatherName" placeholder="Father's Name (Optional)">

            <div class="neon-box">
                <div class="inner-box">
                    <input type="tel" id="utr" class="utr-field" placeholder="Enter 12 Digit UTR" maxlength="12" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    <p style="font-size:11px; margin:5px 0; color:#888;">━━━━━━━━ OR ━━━━━━━━</p>
                    <input type="file" id="ss" accept="image/*" style="width:100%;">
                    <p style="font-size:11px; margin-top:5px; color:#555; font-weight:bold;">Upload Payment Screenshot</p>
                </div>
            </div>

            <button class="btn" onclick="submit()">Verify & Download Receipt</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
    </div>

    <script>
        const ADMIN_WA = "918709610091";
        let currentAmount = 120.00;
        let promoUsed = "NONE";

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function updateQR(amt) {
            const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt.toFixed(2)}&cu=INR&tn=RCORDER`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('amtLabel').innerText = `PAY ₹${amt}`;
        }

        function applyPromo() {
            let code = document.getElementById('promoInput').value.toUpperCase();
            if (code === "RC60") { currentAmount = 60.00; promoUsed = "RC60"; alert("RC60 Applied!"); updateQR(60); }
            else { alert("Invalid Code"); }
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("Invalid Number!"); return; }
            updateQR(currentAmount);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('p2').style.display='block';
        }

        function sendToWhatsApp(d, t, tx) {
            let fn = document.getElementById('fatherName').value || "N/A";
            let uVal = document.getElementById('utr').value || "N/A";
            let veh = document.getElementById('vehInput').value;
            let msg = `*🚀 NEW RC ORDER RECEIVED*\n\n*📦 VEHICLE INFORMATION*\n━━━━━━━━━━━━━━━━━━\n🚗 *Vehicle:* ${veh}\n👤 *Father:* ${fn}\n━━━━━━━━━━━━━━━━━━\n*💳 PAYMENT*\n🆔 *TxId:* ${tx}\n🔢 *UTR:* ${uVal}\n💰 *Amt:* ₹${currentAmount} ✅\n📅 *Date:* ${d} | ${t}\n\n_Please process soon._ 🙏`;
            window.open(`https://wa.me/${ADMIN_WA}?text=` + encodeURIComponent(msg), '_blank');
        }

        function submit() {
            const u = document.getElementById('utr').value;
            const s = document.getElementById('ss').files[0];
            if(!u && !s) { alert("UTR or Screenshot required!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                if (p === 60) {
                    const now = new Date();
                    const txId = "RC" + Math.floor(Math.random() * 9000000);
                    const dStr = now.toLocaleDateString('en-IN');
                    const tStr = now.toLocaleTimeString('en-IN');
                    makePDF(dStr, tStr, txId);
                    sendToWhatsApp(dStr, tStr, txId);
                }
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('load').style.display='none';
                    document.getElementById('successOverlay').style.display='flex';
                    setTimeout(() => location.reload(), 5000);
                }
            }, 80);
        }

        function makePDF(d, t, tx) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const veh = document.getElementById('vehInput').value;
            const fn = document.getElementById('fatherName').value || "N/A";

            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");

            doc.setTextColor(0); doc.setFontSize(12);
            doc.setFont("helvetica", "bold"); doc.text("VEHICLE INFORMATION", 15, 50);
            
            // Table Format
            doc.setFont("helvetica", "normal");
            let y = 60;
            const rows = [["TRANSACTION ID", tx], ["DATE & TIME", `${d} | ${t}`], ["VEHICLE NO", veh], ["FATHER NAME", fn], ["AMOUNT PAID", "INR " + currentAmount], ["STATUS", "SUCCESSFUL"]];
            rows.forEach(r => {
                doc.rect(15, y, 80, 10); doc.rect(95, y, 100, 10);
                doc.text(r[0], 18, y + 7); doc.text(r[1], 98, y + 7);
                y += 10;
            });

            doc.setFont("helvetica", "bold");
            doc.text("Thank you for using our service!", 105, y + 20, null, null, "center");
            doc.save(`Receipt_${veh}.pdf`);
        }
    </script>
</body>
</html>
