
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishra Insurance Service</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:linear-gradient(45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:#fff;
}
.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
}
input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
}
.qr{width:180px;margin-top:10px}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">

<div id="page1">
<h2>वाहन नंबर दर्ज करें</h2>
<input id="vehicle">
<button onclick="goNext()">आगे बढ़ें</button>
</div>

<div id="page2" class="hidden">
<h2>₹120 भुगतान करें</h2>

<button onclick="payUPI()">UPI Pay</button>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi%3A%2F%2Fpay%3Fpa%3D8709610091%40okbizaxis%26pn%3DBest%20Insurance%26am%3D120%26cu%3DINR">

<input id="mobile" placeholder="मोबाइल नंबर">
<input type="file" id="proof">

<button onclick="submitForm()">सबमिट करें</button>
</div>

</div>

<script>

function goNext(){
if(!vehicle.value){alert("वाहन नंबर डालें");return;}
page1.classList.add("hidden");
page2.classList.remove("hidden");
}

function payUPI(){
window.location.href="upi://pay?pa=8709610091@okbizaxis&am=120&cu=INR";
}

/* ===== CANVAS PDF ===== */
function downloadPDF(){

let v = vehicle.value;
let m = mobile.value;

let canvas = document.createElement("canvas");
canvas.width = 600;
canvas.height = 900;
let ctx = canvas.getContext("2d");

/* बैकग्राउंड */
ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,600,900);

/* बॉर्डर */
ctx.lineWidth=6;
ctx.strokeRect(10,10,580,880);

ctx.lineWidth=2;
ctx.strokeRect(20,20,560,860);

/* हेडर */
ctx.fillStyle="#0066cc";
ctx.fillRect(10,10,580,60);

ctx.fillStyle="#ffffff";
ctx.font="bold 24px Arial";
ctx.textAlign="center";
ctx.fillText("RCPDF.IN",300,45);

/* टेक्स्ट */
ctx.fillStyle="#000";
ctx.font="bold 18px Arial";
ctx.fillText("RC डाउनलोड अनुरोध",300,120);

ctx.textAlign="left";
ctx.font="16px Arial";

ctx.fillText("वाहन नंबर: "+v,40,180);
ctx.fillText("मोबाइल नंबर: "+m,40,210);
ctx.fillText("कार्य: RC डाउनलोड",40,240);

ctx.fillText("आपको RC की PDF जल्द ही आपके मोबाइल नंबर "+m+" पर भेज दी जाएगी।",40,290);

/* लाइन */
ctx.beginPath();
ctx.moveTo(40,320);
ctx.lineTo(560,320);
ctx.stroke();

/* शर्तें */
ctx.font="12px Arial";

let y=360;

ctx.fillText("• यह वेबसाइट किसी भी प्रकार से RTO से जुड़ी नहीं है",40,y); y+=25;
ctx.fillText("• हम जानकारी की पूरी तरह सही होने की पुष्टि नहीं करते",40,y); y+=25;
ctx.fillText("• यह साइट केवल जानकारी के उद्देश्य से है",40,y); y+=25;
ctx.fillText("• किसी भी गलत उपयोग की जिम्मेदारी उपयोगकर्ता की होगी",40,y); y+=25;
ctx.fillText("• भुगतान के बाद राशि वापस नहीं की जाएगी",40,y); y+=25;
ctx.fillText("• भुगतान करने का अर्थ है कि उपयोगकर्ता सभी शर्तों से सहमत है",40,y);

/* PDF */
const { jsPDF } = window.jspdf;
const pdf = new jsPDF();

let img = canvas.toDataURL("image/png");
pdf.addImage(img,"PNG",0,0,210,297);

pdf.save("RC_PDF.pdf");
}

/* SUBMIT */
function submitForm(){

if(mobile.value.length<10){
alert("सही मोबाइल नंबर डालें");
return;
}

if(!proof.files[0]){
alert("स्क्रीनशॉट अपलोड करें");
return;
}

/* PDF */
downloadPDF();

alert("सफलतापूर्वक सबमिट हुआ");
}

</script>

</body>
</html>
