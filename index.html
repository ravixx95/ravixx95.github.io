<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            /* Teeno colors ko barabar dikhane ke liye gradient update */
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 50%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.95); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }

        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; }

        #mob, #father_name { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }

        /* Neon Animated File Upload Box */
        .neon-upload-box {
            position: relative;
            padding: 15px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .neon-upload-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 3s linear infinite;
            z-index: 0;
        }
        .neon-upload-box::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: #fff;
            border-radius: 10px;
            z-index: 1;
        }
        #ss { position: relative; z-index: 2; width: 100%; }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; z-index: 5; position: relative; }
        .neon-btn { position: relative; background: #000; color: #fff; font-size: 20px; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .neon-btn::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); animation: rotateRGB 2s linear infinite; }
        .neon-btn::after { content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 20px; }
        #successOverlay { background: rgba(0, 128, 0, 0.98); }
        .footer { margin-top: 30px; font-size: 13px; font-weight: bold; color: #333; text-align: center; padding-bottom: 40px; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: #fff; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 3000; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="location.reload()">🏠</button>
    </div>

    <div id="successOverlay" class="overlay">
        <h1 style="font-size: 30px;">Congratulations!</h1>
        <p style="font-size: 18px; margin-top: 10px;">Aapka REQUEST bhej diya gaya hai.</p>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:12px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="180">
                <p style="color:#000; font-size:10px; font-weight:bold;">SCAN QR TO PAY ₹120</p>
            </div>

            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="father_name" placeholder="Father's Name (Optional)">
            
            <div class="neon-upload-box">
                <input type="file" id="ss" accept="image/*">
                <p style="position:relative; z-index:2; font-size:11px; margin-top:5px; color:#555; font-weight:bold;">Upload Payment Screenshot</p>
            </div>

            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 RCPDF.IN | Original Digital Services</p>
        <p>Make in India with ❤️</p>
    </div>

    <a href="https://wa.me/918709610091" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <div class="loader-wrap" id="load">
        <div class="pct" id="pText">0%</div>
        <p id="loaderMsg">Fetching data...</p>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("Kripya sahi Gadi Number bharein!"); return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href="upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR"; }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            
            // Specific Error Handling
            if(m.length < 10) { alert("Kripya 10 digit ka WhatsApp Number bharein!"); return; }
            if(!s) { alert("Kripya Payment ka Screenshot upload karein!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 5;
                document.getElementById('pText').innerText = p + "%";
                if (p >= 60 && p < 65) {
                    const txId = "RC" + Math.floor(Math.random() * 900000000);
                    await sendT(s, txId);
                }
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('load').style.display='none';
                    document.getElementById('successOverlay').style.display='flex';
                    setTimeout(() => location.reload(), 4000);
                }
            }, 100);
        }

        async function sendT(f, tx) {
            let fd = new FormData();
            let fn = document.getElementById('father_name').value || "N/A";
            fd.append("chat_id", T_CHAT_ID); fd.append("photo", f);
            fd.append("caption", `🚀 *NEW ORDER*\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n👤 *Father:* ${fn}\n🆔 *Tx:* ${tx}`);
            fd.append("parse_mode", "Markdown");
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendPhoto`, { method: "POST", body: fd });
        }
    </script>
</body>
</html>
