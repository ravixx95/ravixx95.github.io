<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravi Mishra System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f7f7f7; padding: 20px; }
        .main-card { background: #fff; padding: 20px; border-radius: 5px; max-width: 400px; margin: auto; border: 1px solid #ddd; }
        h2 { text-align: center; font-size: 18px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
        .number-box { background: #eee; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 15px; border: 1px solid #bbb; min-height: 30px; }
        button { width: 100%; padding: 10px; margin-bottom: 8px; cursor: pointer; border: none; font-weight: bold; }
        .btn-green { background: #28a745; color: #fff; }
        .btn-blue { background: #0088cc; color: #fff; }
        .btn-red { background: #dc3545; color: #fff; }
        
        /* Purana Loader */
        .loading { opacity: 0.6; pointer-events: none; }
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="main-card">
    <h2>RAVI MISHRA DATA ENTRY</h2>

    <input type="text" id="v_num" placeholder="Gadi Number (br09ab1234)" maxlength="10">
    <div class="number-box" id="v_show">BR-00-AA-0000</div>

    <input type="number" id="v_amt" placeholder="Amount">
    <input type="text" id="v_note" placeholder="Remark">

    <button class="btn-green" onclick="talk()">🔊 Awaaz Suniye</button>
    <button class="btn-blue" id="sendBtn" onclick="sendToTG()">✈️ Telegram Send</button>
    <button class="btn-red" onclick="makePDF()">📄 Download PDF</button>
</div>

<script>
    // Aapka Token aur ID jo pehle tha
    const MY_TOKEN = "7290072049:AAH19vG8r66sL-I9pZ-Y9lR9N4qZ-Y9lR9N";
    const MY_ID = "6472900720";

    const vInput = document.getElementById('v_num');
    const vShow = document.getElementById('v_show');

    // Number formatting (BR-09-AB-1234)
    vInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        let out = "";
        if (v.length > 0) out += v.substring(0, 2);
        if (v.length > 2) out += "-" + v.substring(2, 4);
        if (v.length > 4) out += "-" + v.substring(4, 6);
        if (v.length > 6) out += "-" + v.substring(6, 10);
        vShow.innerText = out || "BR-00-AA-0000";
    });

    // Voice Logic
    function talk() {
        const msg = new SpeechSynthesisUtterance();
        msg.text = `Vehicle number ${vShow.innerText}. Amount ${document.getElementById('v_amt').value || 0} rupees.`;
        msg.lang = 'en-IN';
        window.speechSynthesis.speak(msg);
    }

    // Telegram with Loader and Format
    function sendToTG() {
        const btn = document.getElementById('sendBtn');
        const d = new Date().toLocaleString();
        const text = `🚨 *NEW ENTRY*\n\n` +
                     `🚗 *Vehicle:* ${vShow.innerText}\n` +
                     `💰 *Amount:* ${document.getElementById('v_amt').value}\n` +
                     `📝 *Note:* ${document.getElementById('v_note').value}\n` +
                     `⏰ *Time:* ${d}`;

        btn.classList.add('loading');
        btn.innerHTML = '<span class="spinner"></span> Sending...';

        fetch(`https://api.telegram.org/bot${MY_TOKEN}/sendMessage?chat_id=${MY_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
        .then(r => {
            if(r.ok) alert("Sent!");
            btn.classList.remove('loading');
            btn.innerHTML = '✈️ Telegram Send';
        });
    }

    // PDF Style
    function makePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("ENTRY REPORT", 20, 20);
        doc.text(`Vehicle: ${vShow.innerText}`, 20, 40);
        doc.text(`Amount: ${document.getElementById('v_amt').value}`, 20, 50);
        doc.text(`Date: ${new Date().toLocaleString()}`, 20, 60);
        doc.save("Report.pdf");
    }
</script>

</body>
</html>
