<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN | Official Vehicle Portal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --main-blue: #003399; --neon-cyan: #00f3ff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }

        /* RGB Background Animation */
        body { 
            margin: 0;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #0f0c29);
            background-size: 400% 400%;
            animation: rgbBg 15s ease infinite;
            min-height: 100vh;
            color: #333;
        }

        @keyframes rgbBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* LOGIN SCREEN */
        #loginScreen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; }
        .google-btn { 
            background: #fff; color: #333; padding: 15px 30px; border-radius: 50px; 
            border: none; font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(0,243,255,0.5);
            transition: 0.3s;
        }
        .google-btn:hover { transform: scale(1.05); }

        /* NAVBAR */
        #mainApp { display: none; }
        .navbar { 
            background: rgba(0, 51, 153, 0.9); backdrop-filter: blur(10px); color: #fff; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--neon-cyan);
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .user-profile { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 50px; }
        .user-img { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--neon-cyan); }

        /* APP CONTAINER */
        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; padding-bottom: 100px; }

        /* WALLET CARD */
        .wallet-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); color: #fff;
            padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* IND BOX INPUT */
        .service-card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .ind-input-group { 
            display: flex; border: 3px solid #333; border-radius: 12px; overflow: hidden; margin: 15px 0;
        }
        .ind-label { background: var(--main-blue); color: #fff; width: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; }
        .ind-input-group input { flex: 1; border: none; padding: 15px; font-size: 24px; font-weight: 900; text-align: center; text-transform: uppercase; outline: none; background: #fff; }

        /* SERVICE GRID */
        .format-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .format-btn { 
            background: #f8f9fa; border: 1.5px solid #eee; padding: 18px; border-radius: 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .format-btn:hover { border-color: var(--main-blue); background: #f0f4ff; transform: translateY(-3px); }
        .format-btn i { font-size: 26px; color: var(--main-blue); margin-bottom: 10px; display: block; }
        .format-btn span { font-size: 14px; font-weight: 700; color: #444; }

        /* FOOTER */
        footer { background: rgba(255, 255, 255, 0.9); padding: 30px 20px; text-align: center; margin-top: 50px; border-radius: 20px 20px 0 0; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; color: var(--main-blue); font-weight: bold; }
        .footer-links span { cursor: pointer; }

        /* WHATSAPP FLOAT */
        .wa-float { 
            position: fixed; bottom: 25px; right: 25px; background: #25d366; 
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #fff;
            font-size: 32px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 2000;
        }

        /* RECHARGE UI */
        #rechargePage { display: none; }
        .btn-pay { background: var(--main-blue); color: #fff; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 15px; cursor: pointer; }
        .btn-verify { background: #28a745; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1 style="font-size: 50px; text-shadow: 0 0 15px var(--neon-cyan);">RCPDF.IN</h1>
        <p style="letter-spacing: 2px; margin-bottom: 40px;">SECURE VEHICLE PORTAL</p>
        <button class="google-btn" onclick="googleLogin()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="22">
            Login with Google
        </button>
    </div>

    <div id="mainApp">
        <div class="navbar">
            <div class="nav-left">
                <i class="fas fa-home" onclick="showHome()" style="font-size: 22px; cursor: pointer;"></i>
                <span style="font-weight: 900; font-size: 22px; letter-spacing: 1px;">RCPDF.IN</span>
            </div>
            <div class="user-profile">
                <img id="userImg" class="user-img" src="">
                <span id="userName" style="font-size: 13px; font-weight:bold;">User</span>
            </div>
        </div>

        <div class="container">
            <div class="wallet-card">
                <div>
                    <p style="font-size: 13px; opacity: 0.8;">My Balance</p>
                    <h1 id="walletBal" style="font-size: 32px; color: var(--neon-cyan);">₹0.00</h1>
                </div>
                <button onclick="showRecharge()" style="background:#fff; color:var(--main-blue); border:none; padding:10px 18px; border-radius:12px; font-weight:bold; cursor:pointer;">RECHARGE</button>
            </div>

            <div id="homePage">
                <div class="service-card">
                    <h3 style="margin-bottom: 15px; color: var(--main-blue); text-align: center;">Smart Search</h3>
                    <div class="ind-input-group">
                        <div class="ind-label">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg" width="22">
                            <span>IND</span>
                        </div>
                        <input type="text" id="vNumber" placeholder="BR 01 AA 0000" maxlength="11">
                    </div>
                    
                    <div class="format-grid">
                        <div class="format-btn" onclick="order('RC Particular')"><i class="fas fa-file-invoice"></i><span>RC Particular</span></div>
                        <div class="format-btn" onclick="order('DL Search')"><i class="fas fa-id-card"></i><span>DL Search</span></div>
                        <div class="format-btn" onclick="order('Challan Info')"><i class="fas fa-receipt"></i><span>Challan</span></div>
                        <div class="format-btn" onclick="order('Insurance')"><i class="fas fa-shield-virus"></i><span>Insurance</span></div>
                        <div class="format-btn" onclick="order('Owner Details')"><i class="fas fa-user-circle"></i><span>Owner Info</span></div>
                        <div class="format-btn" onclick="order('Fitness/NOC')"><i class="fas fa-file-signature"></i><span>Fitness / NOC</span></div>
                    </div>
                </div>
            </div>

            <div id="rechargePage">
                <div class="service-card" style="text-align: center;">
                    <h3 style="color: var(--main-blue);">Wallet Top-up</h3>
                    <img id="qrCode" src="" width="240" style="margin:20px 0; border:4px solid #f0f0f0; border-radius:10px;">
                    <p style="font-size: 18px;">Amount to Pay: <b>₹100</b></p>
                    <button class="btn-pay" onclick="payNow()">PAY VIA UPI</button>
                    <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
                        <input type="text" id="utr" placeholder="12 Digit UTR Number" style="width:100%; padding:14px; border-radius:10px; border:1px solid #ccc; font-size: 16px;">
                        <button class="btn-verify" onclick="submitUTR()">VERIFY PAYMENT</button>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <span onclick="alert('Email: support@rcpdf.in')">Contact</span>
                <span onclick="alert('No Refund Policy on processed orders.')">Terms</span>
                <span onclick="alert('Data Encrypted by Firebase.')">Privacy</span>
            </div>
            <p style="color: #666;">© 2026 RCPDF.IN | Digital Vehicle Solutions</p>
        </footer>
    </div>

    <a href="https://wa.me/918709610091" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBa32Wn9S9d72FzrbB4QjNbNWC0Jxd4vYs",
            authDomain: "rcpdf-new.firebaseapp.com",
            projectId: "rcpdf-new",
            storageBucket: "rcpdf-new.firebasestorage.app",
            messagingSenderId: "968547234303",
            appId: "1:968547234303:web:7bb61e32683ee5235137ca"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";
        let currentBal = 0;

        // GOOGLE LOGIN WITH AUTO-SAVE
        async function googleLogin() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                // Save User to Database if not exists
                const userRef = db.collection("users").doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    await userRef.set({
                        name: user.displayName,
                        email: user.email,
                        walletBalance: 0,
                        photo: user.photoURL,
                        uid: user.uid
                    });
                }
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName.split(' ')[0];
                document.getElementById('userImg').src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
                
                // Real-time Balance Sync
                db.collection("users").doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        currentBal = doc.data().walletBalance || 0;
                        document.getElementById('walletBal').innerText = "₹" + currentBal;
                    }
                });
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        function showHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('rechargePage').style.display = 'none';
        }

        function showRecharge() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('rechargePage').style.display = 'block';
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=100&cu=INR";
            document.getElementById('qrCode').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(upi)}`;
        }

        function payNow() { window.location.href = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=100&cu=INR"; }

        function submitUTR() {
            const utrVal = document.getElementById('utr').value;
            if(utrVal.length < 12) return alert("Please enter valid 12 digit UTR!");
            sendTelegram(`💰 *RECHARGE REQUEST*\nUser: ${auth.currentUser.displayName}\nUTR: \`${utrVal}\`\nAmount: ₹100`);
            alert("Payment details submitted! Your balance will be updated after verification.");
            showHome();
        }

        function order(serviceName) {
            const vNo = document.getElementById('vNumber').value.toUpperCase();
            if(vNo.length < 5) return alert("Enter correct Vehicle/DL Number!");
            if(currentBal < 100) return alert("Insufficient balance. Please recharge your wallet.");
            
            // Deduct Balance
            db.collection("users").doc(auth.currentUser.uid).update({
                walletBalance: currentBal - 100
            });

            sendTelegram(`🚗 *NEW ORDER*\nService: ${serviceName}\nVehicle No: ${vNo}\nUser: ${auth.currentUser.displayName}\nEmail: ${auth.currentUser.email}`);
            alert(`Order for ${serviceName} placed successfully! Details will be sent to your WhatsApp.`);
        }

        function sendTelegram(msg) {
            fetch(`https://api.telegram.org/bot${T_TOKEN}/sendMessage?chat_id=${T_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
        }
    </script>
</body>
</html>
