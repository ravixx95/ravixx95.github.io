<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; }
        .menu-btn div { width: 100%; height: 3px; background: var(--ind-blue); border-radius: 2px; }
        #liveClock { font-size: 14px; font-weight: 900; color: var(--ind-blue); }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }

        .neon-btn {
            position: relative; background: #000; color: #fff; font-size: 16px; font-weight: 900;
            padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer;
            text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .neon-btn::after { content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }

        /* Promo UI */
        .promo-box { background: #eef2ff; padding: 10px; border-radius: 12px; border: 2px dashed var(--ind-blue); margin-bottom: 15px; }
    </style>
</head>
<body onload="startTime()">

    <div class="header">
        <div class="menu-btn"><div></div><div></div><div></div></div>
        <div id="liveClock">00:00:00</div>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="11">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-size:12px; font-weight:bold; margin-top:5px;">SCAN TO PAY ₹120</p>
            </div>

            <div class="promo-box">
                <input type="text" id="promoInput" placeholder="Promo Code" style="margin-bottom:5px; padding:10px;">
                <button class="btn" style="padding:10px; font-size:14px; background:#28a745;" onclick="applyRC60()">APPLY RC60</button>
            </div>

            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="fatherName" placeholder="Father's Name">
            <input type="tel" id="utr" placeholder="12 Digit UTR Number" maxlength="12">

            <button class="btn" onclick="processAll()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="pct" id="pText">0%</div>
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <p style="margin-top:10px;">🔄 Processing Digital RC...</p>
    </div>

    <script>
        let currentAmt = 120;
        let promoUsed = "NONE";
        const adminWA = "918709610091";

        function startTime() {
            document.getElementById('liveClock').innerHTML = new Date().toLocaleTimeString();
            setTimeout(startTime, 1000);
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 4) return;
            updateQR(currentAmt);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('p2').style.display='block';
        }

        function applyRC60() {
            if(document.getElementById('promoInput').value.toUpperCase() === "RC60") {
                currentAmt = 62;
                promoUsed = "RC60";
                document.getElementById('amtLabel').innerText = "SCAN TO PAY ₹62";
                updateQR(62);
                alert("RC60 Applied!");
            }
        }

        function updateQR(a) {
            let upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${a}.00&cu=INR`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upi);
        }

        function pay() { window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmt}.00&cu=INR`; }

        function processAll() {
            if(document.getElementById('utr').value.length < 10) { alert("Invalid UTR!"); return; }
            if(!confirm("Aap PDF download karna chahte hain?")) return;

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.8) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    sendWhatsApp();
                    generatePDF();
                    location.reload();
                }
            }, 50);
        }

        function sendWhatsApp() {
            const txId = "RC" + Math.floor(Math.random() * 10000000000);
            const veh = document.getElementById('vehInput').value;
            const mob = document.getElementById('mob').value;
            const fn = document.getElementById('fatherName').value;
            const utr = document.getElementById('utr').value;
            const dt = new Date().toLocaleDateString();
            const tm = new Date().toLocaleTimeString();

            let msg = `*🚀 NEW RC ORDER RECEIVED*%0A%0A*📦 VEHICLE INFORMATION*%0A━━━━━━━━━━━━━━━━━━%0A🚗 *Vehicle No:* ${veh}%0A👤 *Father Name:* ${fn}%0A📱 *Customer Mob:* ${mob}%0A━━━━━━━━━━━━━━━━━━%0A*💳 PAYMENT DETAILS*%0A🆔 *TxId:* ${txId}%0A🔢 *UTR:* ${utr}%0A💰 *Amount Paid:* ₹${currentAmt} ✅%0A🎁 *Promo Used:* ${promoUsed}%0A📅 *Date:* ${dt} | ⏰ ${tm}%0A%0A_Please process the RC PDF soon._ 🙏✨`;
            
            window.open(`https://wa.me/${adminWA}?text=${msg}`, '_blank');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const txId = "RC" + Math.floor(Math.random() * 10000000000);

            // Professional Header
            doc.setFillColor(0, 51, 153); doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - OFFICIAL RECEIPT", 105, 22, null, null, "center");

            // Table Format
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 50;
            const rows = [
                ["Vehicle Number", document.getElementById('vehInput').value],
                ["Transaction ID", txId],
                ["UTR Number", document.getElementById('utr').value],
                ["Mobile Number", document.getElementById('mob').value],
                ["Total Paid", "INR " + currentAmt],
                ["Promo Applied", promoUsed]
            ];
            rows.forEach(r => {
                doc.rect(20, y, 170, 10); doc.text(r[0], 25, y+7); doc.text(r[1], 100, y+7);
                y += 10;
            });

            doc.save("RC_Receipt.pdf");
        }
    </script>
</body>
</html>
