// ===== HISTORY =====
function saveHistory(vehicle, amount, date, time){
    let h = JSON.parse(localStorage.getItem("rc_history") || "[]");
    h.unshift({vehicle, service:"RC DOWNLOAD", amount, date, time});
    localStorage.setItem("rc_history", JSON.stringify(h.slice(0,20)));
}

function showHistory(){
    let h = JSON.parse(localStorage.getItem("rc_history") || "[]");
    if(h.length === 0){ alert("No History Found"); return; }
    let txt = "RECENT HISTORY\n\n";
    h.forEach((i,idx)=>{
        txt += `${idx+1}. ${i.vehicle}\n${i.service}\n₹${i.amount} | ${i.date} ${i.time}\n\n`;
    });
    alert(txt);
}

// ===== TELEGRAM SAME STYLE + UTR SUPPORT =====
async function sendT(f, d, t, tx, utr) {
    let fd = new FormData();
    let fn = document.getElementById('fatherName').value || "N/A";

    let caption = `🚀 *NEW RC ORDER*\n\n🆔 *TxId:* \`${tx}\`\n📅 *Date:* ${d}\n⏰ *Time:* ${t}\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n👤 *Father:* ${fn}\n💰 *Amt:* ₹${currentAmount}`;

    if(utr) caption += `\n🏦 *UTR:* ${utr}`;

    fd.append("chat_id", T_CHAT_ID);
    fd.append("parse_mode", "Markdown");

    try {
        if(f){
            fd.append("photo", f);
            fd.append("caption", caption);
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendPhoto`, { method: "POST", body: fd });
        } else {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            makePDF(d, t, tx, utr, doc);
            let blob = doc.output("blob");
            fd.append("document", blob, `Receipt_${tx}.pdf`);
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendDocument`, { method: "POST", body: fd });
        }
        return true;
    } catch (e) { return false; }
}

// ===== SUBMIT =====
function submit() {
    const m = document.getElementById('mob').value;
    const s = document.getElementById('ss').files[0];
    const utr = document.getElementById('utr').value;

    if(m.length < 10){ alert("Mobile required!"); return; }
    if(!s && !utr){ alert("UTR ya Screenshot me se koi ek required hai"); return; }
    if(utr && utr.length !== 12){ alert("UTR must be 12 digit"); return; }

    document.getElementById('load').style.display='flex';

    let p = 0;
    let iv = setInterval(async () => {
        p += 2;
        document.getElementById('pText').innerText = p + "%";
        document.getElementById('carIcon').style.left = (p * 0.85) + "%";

        if (p === 60) {
            const now = new Date();
            const txId = "RC" + Math.floor(Math.random() * 9000000000);

            saveHistory(document.getElementById('vehInput').value, currentAmount, now.toLocaleDateString('en-IN'), now.toLocaleTimeString('en-IN'));

            await sendT(s, now.toLocaleDateString('en-IN'), now.toLocaleTimeString('en-IN'), txId, utr);

            makePDF(now.toLocaleDateString('en-IN'), now.toLocaleTimeString('en-IN'), txId, utr);
        }

        if (p >= 100) {
            clearInterval(iv);
            document.getElementById('load').style.display='none';
            document.getElementById('successOverlay').style.display='flex';
            setTimeout(() => location.reload(), 4000);
        }
    }, 80);
}

// ===== PDF SAME STYLE + UTR =====
function makePDF(d, t, tx, utr="N/A", docObj=null) {
    const { jsPDF } = window.jspdf;
    const doc = docObj || new jsPDF();

    doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
    doc.setTextColor(255); doc.setFont("helvetica", "bold"); doc.setFontSize(22);
    doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");

    doc.setTextColor(0);
    doc.setFontSize(12);

    let y = 50;
    const fn = document.getElementById('fatherName').value || "N/A";

    const data = [
        ["TRANSACTION ID:", tx],
        ["DATE & TIME:", `${d} | ${t}`],
        ["VEHICLE NO:", document.getElementById('vehInput').value],
        ["FATHER'S NAME:", fn],
        ["WHATSAPP NO:", document.getElementById('mob').value],
        ["UTR:", utr]
    ];

    data.forEach(item => {
        doc.rect(15, y, 180, 10);
        doc.text(item[0], 20, y + 7);
        doc.text(item[1], 85, y + 7);
        y += 10;
    });

    doc.save(`Receipt_${tx}.pdf`);
}
