<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ravi Mishra - Final System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 6px solid #0088cc; }
        h2 { text-align: center; color: #1a73e8; font-size: 20px; margin-bottom: 20px; text-transform: uppercase; }
        label { font-weight: bold; display: block; margin-top: 15px; font-size: 13px; color: #444; }
        input { width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        input:focus { border-color: #0088cc; outline: none; background: #fff; }
        .display-box { background: #eef9ff; border: 2px dashed #0088cc; padding: 15px; margin: 20px 0; text-align: center; font-size: 28px; font-weight: 900; color: #005a8d; border-radius: 12px; letter-spacing: 1px; min-height: 40px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        button { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; color: white; transition: 0.3s; }
        .btn-voice { background: linear-gradient(135deg, #673ab7, #512da8); width: 100%; margin-top: 10px; box-shadow: 0 4px 10px rgba(103,58,183,0.3); }
        .btn-pdf { background: #e91e63; }
        .btn-telegram { background: #0088cc; box-shadow: 0 4px 10px rgba(0,136,204,0.3); }
        button:active { transform: scale(0.96); }
        #status { font-size: 13px; text-align: center; margin-top: 15px; font-weight: bold; color: #2e7d32; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Ravi Mishra Log Tool</h2>

    <label>Gadi Number (Type karein):</label>
    <input type="text" id="vehNumber" placeholder="br09ab1234" maxlength="10">

    <div class="display-box" id="formattedDisplay">---</div>

    <label>Amount (₹):</label>
    <input type="number" id="amount" placeholder="0.00">

    <label>Detail / Note:</label>
    <input type="text" id="desc" placeholder="Enter notes...">

    <button class="btn-voice" onclick="speakNow()">🔊 Awaaz Suniye</button>

    <div class="btn-group">
        <button class="btn-pdf" onclick="generatePDF()">📄 PDF Download</button>
        <button class="btn-telegram" onclick="sendTelegram()">✈️ Telegram Bhein</button>
    </div>
    
    <div id="status">✅ Message Sent Successfully!</div>
</div>

<script>
    // --- UPDATED WITH YOUR PREVIOUS DETAILS ---
    const TELEGRAM_TOKEN = "7290072049:AAH19vG8r66sL-I9pZ-Y9lR9N4qZ-Y9lR9N"; // Your Bot Token
    const TELEGRAM_CHAT_ID = "6472900720"; // Your Chat ID

    const vehInput = document.getElementById('vehNumber');
    const display = document.getElementById('formattedDisplay');

    // 1. Precise Auto Formatting (BR-09-AB-1234)
    vehInput.addEventListener('input', (e) => {
        let val = e.target.value.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
        let f = "";
        if (val.length > 0) f += val.substring(0, 2);
        if (val.length > 2) f += "-" + val.substring(2, 4);
        if (val.length > 4) f += "-" + val.substring(4, 6);
        if (val.length > 6) f += "-" + val.substring(6, 10);
        
        display.innerText = f || "---";
    });

    // 2. Voice/Instructions Logic
    function speakNow() {
        const num = display.innerText;
        const amt = document.getElementById('amount').value || "Zero";
        if(num === "---") return;
        
        const utterance = new SpeechSynthesisUtterance(`Vehicle number ${num.split('').join(' ')}. Amount ${amt} rupees.`);
        utterance.lang = 'en-IN';
        utterance.rate = 0.85;
        window.speechSynthesis.speak(utterance);
    }

    // 3. PDF Logic
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const d = new Date();
        
        doc.setFontSize(18);
        doc.text("RAVI MISHRA - ENTRY REPORT", 105, 20, {align: 'center'});
        doc.setFontSize(12);
        doc.text(`Date: ${d.toLocaleDateString()} | Time: ${d.toLocaleTimeString()}`, 20, 40);
        doc.text(`Vehicle No: ${display.innerText}`, 20, 55);
        doc.text(`Amount: Rs. ${document.getElementById('amount').value}`, 20, 70);
        doc.text(`Description: ${document.getElementById('desc').value}`, 20, 85);
        
        doc.save(`Entry_${display.innerText}.pdf`);
    }

    // 4. Telegram Logic
    function sendTelegram() {
        const now = new Date();
        const msg = `🚀 *RAVI MISHRA NEW LOG*\n` +
                    `━━━━━━━━━━━━━━━━━━\n` +
                    `📅 *Date:* ${now.toLocaleDateString()}\n` +
                    `⏰ *Time:* ${now.toLocaleTimeString()}\n` +
                    `🚗 *Vehicle:* \`${display.innerText}\` \n` +
                    `💰 *Amount:* ₹${document.getElementById('amount').value || '0'}\n` +
                    `📝 *Detail:* ${document.getElementById('desc').value || '-'}\n` +
                    `━━━━━━━━━━━━━━━━━━`;

        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`;

        fetch(url).then(res => {
            if(res.ok) {
                document.getElementById('status').style.display = 'block';
                setTimeout(() => document.getElementById('status').style.display = 'none', 3000);
            } else {
                alert("Check Token/ChatID!");
            }
        });
    }
</script>

</body>
</html>
