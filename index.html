<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%); background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh; }
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }
        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #mob, #fatherName, #utrInput { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }
        .neon-btn { position: relative; background: #000; color: #fff; font-size: 16px; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .neon-btn::after { content: 'PAYMENT WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
        .promo-container { margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; border: 1.5px dashed var(--ind-blue); display: flex; justify-content: space-between; align-items: center; }
        .promo-apply-btn { background: var(--ind-blue); color: #fff; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 128, 0, 0.98); color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div id="successOverlay" class="overlay">
        <h1 style="font-size: 40px;">😊</h1>
        <h1>Congratulations!</h1>
        <p>Aapka REQUEST bhej diya gaya hai.</p>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <div id="promo-msg" style="display:none; color: green; font-weight: bold;">Hurray! 🎉 WELCOME10 Applied!</div>
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:10px; border-radius:15px; margin-bottom:15px; border:1px solid #ddd; display:inline-block;">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-size:10px; font-weight:bold;">SCAN TO PAY ₹120</p>
            </div>
            <div class="promo-container">
                <div><small>Offer:</small> <b>WELCOME10</b></div>
                <button id="applyBtn" class="promo-apply-btn" onclick="handlePromo()">APPLY</button>
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="fatherName" placeholder="Father's Name (Optional)">
            <input type="text" id="utrInput" placeholder="Enter 12 Digit UTR Number" maxlength="12" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            <div style="margin: 5px 0;">-- OR --</div>
            <div style="border:1px dashed #000; padding:10px; border-radius:10px; margin-bottom:10px;">
                <input type="file" id="ss" accept="image/*">
                <p style="font-size:11px;">Upload Screenshot</p>
            </div>
            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🏛️</div></div>
        <div class="pct" id="pText">0%</div>
        <p>🔄 Processing...</p>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";
        let currentAmount = 120.00;
        let promoUsed = "NONE";

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            i.value = v.length > 6 ? v.substring(0,2)+"-"+v.substring(2,4)+"-"+v.substring(4,6)+"-"+v.substring(6,10) : v;
        }

        function updatePaymentLinks(amt) {
            const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt.toFixed(2)}&cu=INR&tn=RC%20DOWNLOAD`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
        }

        function go2() { 
            if(document.getElementById('vehInput').value.length < 9) return alert("Invalid No!"); 
            updatePaymentLinks(currentAmount);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        function handlePromo() {
            const btn = document.getElementById('applyBtn');
            if (promoUsed === "NONE") {
                currentAmount = 108.00; promoUsed = "WELCOME10";
                btn.innerText = "REMOVE"; btn.style.background = "red";
                document.getElementById('promo-msg').style.display = "block";
            } else {
                currentAmount = 120.00; promoUsed = "NONE";
                btn.innerText = "APPLY"; btn.style.background = "#003399";
                document.getElementById('promo-msg').style.display = "none";
            }
            document.getElementById('amtLabel').innerText = `SCAN TO PAY ₹${currentAmount}`;
            updatePaymentLinks(currentAmount);
        }

        function pay() { window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmount.toFixed(2)}&cu=INR&tn=RC%20DOWNLOAD`; }

        async function sendToTelegram(fileBlob, txId, isPdf = false) {
            let fd = new FormData();
            fd.append("chat_id", T_CHAT_ID);
            const fileName = isPdf ? `Receipt_${txId}.pdf` : `SS_${txId}.png`;
            fd.append(isPdf ? "document" : "photo", fileBlob, fileName);
            fd.append("caption", `🚀 *NEW ORDER*\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}\n🔢 UTR: ${document.getElementById('utrInput').value || 'N/A'}`);
            fd.append("parse_mode", "Markdown");
            
            const action = isPdf ? "sendDocument" : "sendPhoto";
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/${action}`, { method: "POST", body: fd });
        }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            const u = document.getElementById('utrInput').value;
            if(m.length < 10 || (!s && u.length < 12)) return alert("Details Missing or Invalid UTR!");

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 2; document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                if (p === 60) {
                    const txId = "RC" + Math.floor(Math.random() * 9000000000);
                    const pdfBlob = makePDF(txId, true); // Get blob for telegram
                    if(s) await sendToTelegram(s, txId, false); // Send Screenshot if exists
                    await sendToTelegram(pdfBlob, txId, true); // Send PDF to Telegram
                    makePDF(txId, false); // Download for user
                }
                if (p >= 100) {
                    clearInterval(iv);
                    document.getElementById('load').style.display='none';
                    document.getElementById('successOverlay').style.display='flex';
                    setTimeout(() => location.reload(), 4000);
                }
            }, 80);
        }

        function makePDF(tx, returnBlob = false) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const now = new Date();
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(20); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 50;
            const data = [
                ["TX ID:", tx], ["DATE:", now.toLocaleString()], 
                ["VEHICLE:", document.getElementById('vehInput').value],
                ["UTR NO:", document.getElementById('utrInput').value || "N/A"],
                ["MOBILE:", document.getElementById('mob').value],
                ["PAID AMT:", "INR " + currentAmount.toFixed(2)]
            ];
            data.forEach(item => { doc.rect(15, y, 180, 10); doc.text(item[0], 20, y+7); doc.text(item[1], 80, y+7); y+=10; });
            
            doc.text("Delivery Status: 30-60 Minutes on WhatsApp", 15, y+10);
            doc.rect(5, 5, 200, 287);

            if(returnBlob) return doc.output('blob');
            doc.save(`Receipt_${tx}.pdf`);
        }
    </script>
</body>
</html>
