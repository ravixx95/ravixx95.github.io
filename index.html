<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%); background-attachment: fixed; min-height: 100vh; }

        /* Header & Clock */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 3px solid var(--ind-blue); height: 60px; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; }
        .menu-btn div { width: 100%; height: 3px; background: var(--ind-blue); border-radius: 2px; }
        #liveClock { font-size: 14px; font-weight: bold; color: var(--ind-blue); }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 16px; text-align: center; font-weight: bold; outline: none; }
        #vehInput { text-transform: uppercase; font-size: 24px; border-color: #000; }

        /* Payment UI */
        .qr-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 15px; margin-bottom: 15px; display: inline-block; }
        .neon-btn { background: #000; color: #fff; padding: 15px; width: 100%; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,0,0,0.2); }

        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 80%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 30px; position: absolute; bottom: 0; left: 0; }
        .pct { font-size: 40px; font-weight: bold; color: var(--primary); }

        .btn-green { background: #28a745; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body onload="startTime()">

    <div class="header">
        <div class="menu-btn"><div></div><div></div><div></div></div>
        <b style="color:var(--ind-blue); font-size:20px;">RCPDF.IN</b>
        <div id="liveClock">00:00:00</div>
    </div>

    <div class="card">
        <div id="p1">
            <h3 style="margin-bottom:15px;">Gaadi Number Daalein</h3>
            <input type="text" id="vehInput" placeholder="BR09AB5657" maxlength="11">
            <button class="btn-green" style="background:var(--ind-blue); padding:18px;" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()">PAY WITH UPI ❤️</button>
            <div class="qr-box">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-weight:bold; margin-top:5px;">PAY ₹120</p>
            </div>

            <div style="background:#f0f4ff; padding:10px; border-radius:10px; margin-bottom:15px; border:1.5px dashed blue;">
                <input type="text" id="promoInput" placeholder="Promo Code?" style="margin:5px 0; padding:10px; font-size:13px; width:60%;">
                <button onclick="applyRC60()" style="padding:10px; background:var(--ind-blue); color:#fff; border:none; border-radius:5px; cursor:pointer;">APPLY</button>
                <p id="p-msg" style="display:none; color:green; font-size:12px; font-weight:bold; margin-top:5px;">Code RC60 Applied! Price: ₹62</p>
            </div>

            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="utr" placeholder="12 Digit UTR Number" maxlength="12">
            <button class="btn-green" style="font-size:18px; padding:18px;" onclick="startProcess()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="pct" id="pText">0%</div>
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <p style="margin-top:15px;">🔄 Generating Professional Receipt...</p>
    </div>

    <script>
        let currentAmt = 120;
        let promo = "NONE";
        const adminWA = "918709610091";

        function startTime() {
            const now = new Date();
            document.getElementById('liveClock').innerHTML = now.toLocaleTimeString();
            setTimeout(startTime, 1000);
        }

        function go2() {
            let v = document.getElementById('vehInput').value;
            if(v.length < 4) { alert("Invalid Number"); return; }
            updateQR(currentAmt);
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function applyRC60() {
            if(document.getElementById('promoInput').value.toUpperCase() === "RC60") {
                currentAmt = 62;
                promo = "RC60";
                document.getElementById('p-msg').style.display='block';
                document.getElementById('amtLabel').innerText = "PAY ₹62";
                updateQR(62);
            } else { alert("Galt Code"); }
        }

        function updateQR(a) {
            let link = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${a}.00&cu=INR`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(link);
        }

        function pay() { window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmt}.00&cu=INR`; }

        function startProcess() {
            if(document.getElementById('mob').value.length < 10 || document.getElementById('utr').value.length < 8) {
                alert("Sahi details bharein!"); return;
            }
            if(!confirm("Aap Receipt Download karna chahte hain?")) return;

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p*0.8) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    generatePDF();
                    sendWhatsApp();
                    alert("Success! Details WhatsApp par bhej di gayi hain.");
                    location.reload();
                }
            }, 50);
        }

        function sendWhatsApp() {
            let v = document.getElementById('vehInput').value;
            let m = document.getElementById('mob').value;
            let u = document.getElementById('utr').value;
            let msg = `🚀 *NEW ORDER* 🚀%0A🚗 *Veh:* ${v}%0A📱 *WhatsApp:* ${m}%0A🔢 *UTR:* ${u}%0A💰 *Paid:* ₹${currentAmt}%0A🎟️ *Promo:* ${promo}%0A⏰ *Time:* ${new Date().toLocaleTimeString()}`;
            window.open(`https://wa.me/${adminWA}?text=${msg}`, '_blank');
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const txId = "TXN" + Math.floor(Math.random()*999999);
            
            doc.setFillColor(0, 51, 153); doc.rect(0, 0, 210, 40, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 60;
            const data = [
                ["Vehicle No", document.getElementById('vehInput').value],
                ["Transaction ID", txId],
                ["WhatsApp No", document.getElementById('mob').value],
                ["UTR Number", document.getElementById('utr').value],
                ["Promo Code", promo],
                ["Total Paid", "INR " + currentAmt]
            ];
            data.forEach(r => {
                doc.setFont("helvetica", "bold"); doc.text(r[0]+":", 20, y);
                doc.setFont("helvetica", "normal"); doc.text(r[1], 80, y);
                y += 12;
            });

            doc.rect(15, 140, 180, 40);
            doc.text("TERMS: Digital delivery takes 30-60 mins. No Refund.", 20, 150);
            doc.text("CONTACT: support@rcpdf.in | +91 8709610091", 20, 160);
            
            doc.save(`Receipt_${txId}.pdf`);
        }
    </script>
</body>
</html>
