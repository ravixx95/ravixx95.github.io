<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - All Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #mob, #fatherName { width: 100%; padding: 18px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 20px; text-align: center; font-weight: bold; }

        .neon-box { position: relative; padding: 4px; border-radius: 15px; background: #000; overflow: hidden; margin-bottom: 20px; }
        .neon-box::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 3s linear infinite;
        }
        .inner-box { position: relative; background: #fff; border-radius: 11px; padding: 15px; z-index: 1; }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-challan { background: #f1c40f; color: #000; margin-top: 15px; border: 2px solid #d4ac0d; }

        /* Modified Loader */
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 40px; }
        .car { font-size: 40px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); z-index: 5; transition: 0.1s linear; }
        .rto-office { position: absolute; right: 20%; bottom: 5px; font-size: 35px; }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
            <button class="btn btn-challan" onclick="window.location.href='https://echallan.parivahan.gov.in/index/accused-challan#challan_list'">PAY CHALLAN ONLINE</button>
        </div>

        <div id="p2" style="display:none;">
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
                <p style="font-size:12px; font-weight:bold; margin-top:5px;">SCAN QR TO PAY ₹120</p>
            </div>
            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="fatherName" placeholder="Enter Father's Name">
            <div class="neon-box">
                <div class="inner-box">
                    <input type="file" id="ss" accept="image/*" style="width:100%;">
                    <p style="font-size:11px; margin-top:5px; color:#555; font-weight:bold;">Upload Payment Screenshot</p>
                </div>
            </div>
            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="pct" id="pText">0%</div>
        <div class="road">
            <div class="car" id="carIcon">🚗</div>
            <div class="rto-office" id="rto">🏢 <small style="font-size:10px; display:block; color:yellow;">RTO OFFICE</small></div>
        </div>
        <p style="color:#fff; margin-top:20px;" id="statusMsg">Connecting to RTO Server...</p>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 9) { alert("Invalid Number!"); return; }
            const upi = "upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=RCPDF%20SERVICES";
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        async function sendT(f, tx) {
            let fd = new FormData();
            let fn = document.getElementById('fatherName').value || "N/A";
            fd.append("chat_id", T_CHAT_ID); fd.append("photo", f);
            fd.append("caption", `🚀 *NEW RC ORDER*\n\n🆔 *TxId:* \`${tx}\`\n🚗 *Veh:* ${document.getElementById('vehInput').value}\n📱 *Mob:* ${document.getElementById('mob').value}\n👤 *Father:* ${fn}\n💰 *Amt:* ₹120`);
            fd.append("parse_mode", "Markdown");
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendPhoto`, { method: "POST", body: fd });
        }

        function submit() {
            const m = document.getElementById('mob').value;
            const f = document.getElementById('fatherName').value;
            const s = document.getElementById('ss').files[0];
            
            if(m.length < 10 || !s || f === "") { 
                alert("Please fill all details and upload screenshot first!"); 
                return; 
            }

            // Loader starts ONLY AFTER upload button click and validation
            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 1;
                document.getElementById('pText').innerText = p + "%";
                
                // Car movement
                let carPos = p * 0.85;
                document.getElementById('carIcon').style.left = carPos + "%";

                // Pause at 73% (RTO Office)
                if (p === 73) {
                    clearInterval(iv);
                    document.getElementById('statusMsg').innerText = "Reached RTO Office. Verifying Data...";
                    document.getElementById('rto').style.color = "#00ff00";
                    
                    const txId = "RC" + Math.floor(Math.random() * 9000000000);
                    await sendT(s, txId);
                    makePDF(txId);

                    // Continue after 2 seconds
                    setTimeout(() => {
                        iv = setInterval(() => {
                            p += 1;
                            document.getElementById('pText').innerText = p + "%";
                            document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                            document.getElementById('statusMsg').innerText = "Generating Final Receipt...";
                            if (p >= 100) { clearInterval(iv); location.reload(); }
                        }, 50);
                    }, 2000);
                }
            }, 60);
        }

        function makePDF(tx) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const vNo = document.getElementById('vehInput').value;
            const fName = document.getElementById('fatherName').value;
            const mob = document.getElementById('mob').value;

            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - OFFICIAL RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 50;
            const data = [
                ["TRANSACTION ID:", tx], ["DATE & TIME:", `${new Date().toLocaleDateString('en-IN')} | ${new Date().toLocaleTimeString('en-IN')}`], 
                ["VEHICLE NO:", vNo], ["FATHER'S NAME:", fName], 
                ["WHATSAPP NO:", mob], ["AMOUNT PAID:", "INR 120.00"], ["STATUS:", "SUCCESSFUL"]
            ];
            data.forEach(item => { doc.rect(15, y, 180, 10); doc.text(item[0], 20, y + 7); doc.text(item[1], 85, y + 7); y += 10; });

            const webQR = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://rcpdf.in";
            doc.rect(15, y + 10, 180, 45);
            doc.setFontSize(10); doc.text("SCAN FOR SUPPORT (RCPDF.IN)", 25, y + 20);
            doc.addImage(webQR, 'PNG', 150, y + 15, 35, 35);

            y += 65;
            doc.setFontSize(14); doc.setFont("helvetica", "bold"); doc.text("TERMS AND CONDITIONS", 15, y);
            doc.setFontSize(9); doc.setFont("helvetica", "normal");
            const terms = [
                "1. This is a digital processing receipt. Final PDF will be sent to WhatsApp.",
                "2. RCPDF.IN is a private portal and NOT affiliated with RTO or Parivahan.",
                "3. Paid amount is 100% non-refundable once the request is processed.",
                "4. User is responsible for providing the correct Vehicle and Father's name.",
                "5. This website is for informational use and not a legal government document.",
                "6. If you don't receive the PDF in 60 mins, contact support with Txn ID.",
                "7. Any misuse of this receipt for legal disputes is not the website's responsibility."
            ];
            doc.text(terms, 15, y + 8);

            doc.setFont("times", "italic"); doc.setFontSize(55); doc.setTextColor(0, 51, 153);
            doc.text("Thank You", 105, 275, null, null, "center");
            doc.setDrawColor(0, 51, 153); doc.setLineWidth(1); doc.rect(5, 5, 200, 287);
            doc.save(`Receipt_${tx}.pdf`);
        }
    </script>
</body>
</html>
