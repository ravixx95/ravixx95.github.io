<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPDF.IN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
font-family:Segoe UI;
background:linear-gradient(-45deg,#005BAC,#00c6ff);
display:flex;flex-direction:column;align-items:center;color:#fff;
}

/* NUMBER PLATE */
.vehicleBox{
display:flex;
align-items:center;
background:#fff;
border-radius:25px;
overflow:hidden;
margin-top:20px;
}

.ind{
width:60px;
height:55px;
background:#dfe8f5;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.ind svg{width:18px;height:18px}
.ind span{font-size:12px;font-weight:bold;color:#003399}

input{
flex:1;
padding:14px;
border:none;
outline:none;
text-transform:uppercase;
}

/* BUTTON */
button{
margin-top:15px;
padding:12px;
width:100%;
background:#000;
color:#fff;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<h3>Enter Your Vehicle Number</h3>

<div class="vehicleBox">
<div class="ind">
<svg viewBox="0 0 24 24" stroke="#003399" fill="none">
<circle cx="12" cy="12" r="9"/>
</svg>
<span>IND</span>
</div>
<input id="vehicle" placeholder="BR-09-AB-1234">
</div>

<input id="mobile" placeholder="Mobile Number">
<input type="file" id="proof">

<button onclick="generatePDF()">Submit</button>

<script>

function generatePDF(){

const { jsPDF } = window.jspdf;
let pdf = new jsPDF();

let d=new Date();
let txn="TXN"+Math.floor(Math.random()*999999);

/* HEADER */
pdf.setFont("helvetica","bold");
pdf.setFontSize(16);
pdf.text("RCPDF.IN",105,20,null,null,"center");

/* DETAILS */
pdf.setFont("helvetica","normal");
pdf.setFontSize(10);

pdf.text("Vehicle: "+vehicle.value,20,40);
pdf.text("Mobile: "+mobile.value,20,50);
pdf.text("Work: RC Download",20,60);
pdf.text("Transaction: "+txn,20,70);

/* T&C */
pdf.setFontSize(8);
let y=120;

pdf.text("• Yeh website RTO se judi nahi hai",10,y); y+=5;
pdf.text("• Data ki guarantee nahi hai",10,y); y+=5;
pdf.text("• Sirf information purpose ke liye hai",10,y); y+=5;
pdf.text("• Galat use ki jimmedari user ki hogi",10,y); y+=5;
pdf.text("• Payment ke baad refund nahi milega",10,y); y+=5;
pdf.text("• Payment karna terms accept mana jayega",10,y); y+=5;
pdf.text("• Payment ka matlab sabhi sharte maan li gayi hai",10,y);

pdf.save("RC.pdf");

}

</script>

</body>
</html>
