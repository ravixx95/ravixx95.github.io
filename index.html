<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed;
            color: #000; overflow-x: hidden; min-height: 100vh;
        }

        /* Clock Style */
        #liveClock { font-size: 14px; font-weight: bold; color: var(--ind-blue); }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .menu-btn { cursor: pointer; display: flex; flex-direction: column; gap: 4px; width: 28px; z-index: 1001; }
        .menu-btn div { width: 100%; height: 3px; background: var(--ind-blue); border-radius: 2px; }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }

        .card { margin: 100px auto 20px; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 80px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 65px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 30px; margin-bottom: 4px; }
        
        #vehInput { flex: 1; border: none; height: 100%; font-size: 26px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; width: 100%; padding-left: 70px; }
        #mob, #fatherName, .utr-field, #promoInput { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }

        .neon-btn {
            position: relative; background: #000; color: #fff; font-size: 16px; font-weight: 900;
            padding: 18px; width: 100%; border-radius: 15px; border: none; cursor: pointer;
            text-transform: uppercase; margin-bottom: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .neon-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotateRGB 2s linear infinite;
        }
        .neon-btn::after { content: 'PAY WITH UPI ❤️'; position: absolute; inset: 4px; background: #000; border-radius: 12px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }

        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 85%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car { font-size: 45px; position: absolute; bottom: 0; left: 0; transform: scaleX(-1); }
        .pct { font-size: 45px; font-weight: 900; color: #ff0066; }
        
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; padding: 20px; background: rgba(0, 128, 0, 0.98); }

        .promo-container { margin-bottom: 15px; background: #eef2ff; padding: 12px; border-radius: 12px; border: 1.5px dashed var(--ind-blue); }
        #promo-msg { color: #138808; font-weight: bold; font-size: 13px; margin-top: 5px; display: none; }
    </style>
</head>
<body onload="startTime()">

    <div class="header">
        <div id="liveClock">00:00:00</div>
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px; cursor:pointer;" onclick="location.reload()">🏠</button>
    </div>

    <div id="successOverlay" class="overlay">
        <h1 style="font-size: 40px;">😊</h1>
        <h1 style="font-size: 30px;">Success!</h1>
        <p style="font-size: 18px; margin-top: 10px;">Aapka Data WhatsApp par bhej diya gaya hai.</p>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Digital RC Portal</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <button class="neon-btn" onclick="pay()"></button>
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
                <p id="amtLabel" style="font-size:12px; font-weight:bold; margin-top:5px;">PAY ₹120</p>
            </div>

            <div class="promo-container">
                <input type="text" id="promoInput" placeholder="Enter Promo Code" style="margin-bottom:5px; padding:10px; font-size:14px;">
                <button class="btn" style="padding:10px; font-size:14px; background:#28a745;" onclick="applyRC60()">APPLY RC60</button>
                <div id="promo-msg">RC60 Applied! Price is now ₹62</div>
            </div>

            <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="fatherName" placeholder="Father's Name (Optional)">
            <input type="tel" id="utr" class="utr-field" placeholder="12 Digit UTR / Txn ID" maxlength="12">

            <button class="btn" onclick="submitData()">Download PDF</button>
        </div>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
        <p style="color:#fff; margin-top:10px;">🔄 Generating PDF...</p>
    </div>

    <script>
        let currentAmount = 120;
        let promoUsed = "NONE";
        const adminWA = "918709610091";

        function startTime() {
            const today = new Date();
            let h = today.getHours();
            let m = today.getMinutes();
            let s = today.getSeconds();
            m = checkTime(m);
            s = checkTime(s);
            document.getElementById('liveClock').innerHTML = h + ":" + m + ":" + s;
            setTimeout(startTime, 1000);
        }
        function checkTime(i) { if (i < 10) {i = "0" + i}; return i; }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            i.value = v;
        }

        function go2() {
            if(document.getElementById('vehInput').value.length < 6) { alert("Sahi Number Daalein!"); return; }
            updateQR(currentAmount);
            document.getElementById('p1').style.display='none'; 
            document.getElementById('p2').style.display='block';
        }

        function applyRC60() {
            let code = document.getElementById('promoInput').value.toUpperCase();
            if(code === "RC60") {
                currentAmount = 62;
                promoUsed = "RC60";
                document.getElementById('promo-msg').style.display = "block";
                document.getElementById('amtLabel').innerText = "PAY ₹62";
                updateQR(62);
            } else { alert("Galt Code!"); }
        }

        function updateQR(amt) {
            let upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${amt}.00&cu=INR`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(upi);
        }

        function pay() {
            window.location.href = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=${currentAmount}.00&cu=INR`;
        }

        function submitData() {
            const m = document.getElementById('mob').value;
            const u = document.getElementById('utr').value;
            const veh = document.getElementById('vehInput').value;

            if(m.length < 10 || u.length < 6) { alert("Details Puri Bharein!"); return; }

            if(confirm("Kya aap PDF download karna chahte hain?")) {
                document.getElementById('load').style.display='flex';
                let p = 0;
                let iv = setInterval(() => {
                    p += 2;
                    document.getElementById('pText').innerText = p + "%";
                    document.getElementById('carIcon').style.left = (p * 0.85) + "%";
                    
                    if (p >= 100) {
                        clearInterval(iv);
                        document.getElementById('load').style.display='none';
                        sendToWhatsApp();
                        makePDF();
                        document.getElementById('successOverlay').style.display='flex';
                        setTimeout(() => location.reload(), 3000);
                    }
                }, 50);
            }
        }

        function sendToWhatsApp() {
            const veh = document.getElementById('vehInput').value;
            const mob = document.getElementById('mob').value;
            const fn = document.getElementById('fatherName').value || "N/A";
            const utr = document.getElementById('utr').value;
            const time = document.getElementById('liveClock').innerText;

            let msg = `🚀 *NEW ORDER RECEIVED* 🚀%0A%0A🚗 *Vehicle:* ${veh}%0A👤 *Father:* ${fn}%0A📱 *WhatsApp:* ${mob}%0A🔢 *UTR:* ${utr}%0A💰 *Amount:* ₹${currentAmount}%0A🎟️ *Promo:* ${promoUsed}%0A⏰ *Time:* ${time}%0A%0A✅ *Status:* Payment Pending/Verified`;
            
            // Hidden trigger to notify admin via WA
            let link = `https://wa.me/${adminWA}?text=${msg}`;
            window.open(link, '_blank');
        }

        function makePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("RCPDF.IN - PAYMENT RECEIPT", 10, 10);
            doc.text(`Vehicle: ${document.getElementById('vehInput').value}`, 10, 20);
            doc.text(`Amount Paid: ₹${currentAmount}`, 10, 30);
            doc.text(`UTR: ${document.getElementById('utr').value}`, 10, 40);
            doc.save("Receipt.pdf");
        }
    </script>
</body>
</html>
