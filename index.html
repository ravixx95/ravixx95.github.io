<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mishra Insurance Service</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,Arial}
body{
min-height:100vh;
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bgMove 8s ease infinite;
display:flex;flex-direction:column;align-items:center;color:#fff;
}
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
.card{
margin-top:110px;width:92%;max-width:420px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;border-radius:20px;text-align:center;
}
input{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:none}
.neonBtn{
width:100%;padding:14px;margin-top:14px;border:none;border-radius:12px;
background:#111;color:#fff;cursor:pointer;
}
.hidden{display:none}
.qr{width:180px;margin-top:15px;border-radius:12px}
</style>
</head>

<body>

<div class="card">

<div id="page1">
<h2>Enter Vehicle Number</h2>
<input id="vehicle" placeholder="BR-09-AB-1234">
<button class="neonBtn" onclick="goNext()">Continue</button>
</div>

<div id="page2" class="hidden">
<h2>Service Fee ₹120</h2>

<button class="neonBtn"
onclick="window.location.href='upi://pay?pa=8709610091@okbizaxis&pn=Best%20Insurance&am=120&cu=INR&tn=RC%20PDF'">
Pay ₹120
</button>

<img class="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=8709610091@okbizaxis&pn=Best%20Insurance&am=120&cu=INR&tn=RC%20PDF">

<input id="mobile" placeholder="Mobile Number">
<input type="file" id="proof">

<button class="neonBtn" onclick="submitForm()">Submit</button>
</div>

</div>

<script>

function goNext(){
if(!vehicle.value){alert("Enter vehicle");return;}
page1.classList.add("hidden");
page2.classList.remove("hidden");
}

/* ===== PDF FUNCTION ===== */
function downloadPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();

let v = vehicle.value;
let m = mobile.value;

// Title
doc.setFontSize(14);
doc.setTextColor(0,102,204);
doc.text("RCPDF.IN",105,15,null,null,"center");

// Heading
doc.setFontSize(12);
doc.setTextColor(0,0,0);
doc.text("RC DOWNLOAD REQUEST",105,25,null,null,"center");

// User Info
doc.setFontSize(11);
doc.text("Vehicle Number: "+v,20,40);
doc.text("Mobile Number: "+m,20,48);
doc.text("Work: RC Download",20,56);

// Message
doc.setFontSize(10);
doc.text("Aapko RC ki PDF jald hi aapke number "+m+" par bhej diya jayega.",20,70);

// Line
doc.line(20,75,190,75);

// Disclaimer
doc.setFontSize(7);
let y=85;

doc.text("• Ye website kisi bhi tarah se RTO se juda nahi hai",20,y); y+=5;
doc.text("• Hum jaankari ki sahi hone ki koi guarantee nahi dete",20,y); y+=5;
doc.text("• Ye sirf jaankari purpose ke liye hai",20,y); y+=5;
doc.text("• Galat istemal ki jimmedari user ki hogi",20,y); y+=5;
doc.text("• Payment ke baad refund nahi milega",20,y); y+=5;
doc.text("• Payment karna matlab user sabhi sharton se sehmat hai",20,y);

doc.save("RC_PDF_Request.pdf");
}

/* ===== SUBMIT ===== */
function submitForm(){
if(mobile.value.length<10){alert("Enter valid mobile");return;}
if(!proof.files[0]){alert("Upload screenshot");return;}

// PDF download
downloadPDF();

// Telegram send (same as your system)
let data=new FormData();
data.append("chat_id","5600045707");
data.append("caption","Vehicle: "+vehicle.value+"\nMobile: "+mobile.value);
data.append("photo",proof.files[0]);

fetch("https://api.telegram.org/bot8138238341:AAFlgSY3OGo5oOfa-IbZ9DxdgrmAeVE525E/sendPhoto",
{method:"POST",body:data});

alert("Submitted Successfully ✅");
}

</script>

</body>
</html>
