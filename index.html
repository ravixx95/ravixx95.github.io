<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Vehicle Services</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
        body { background: linear-gradient(180deg, #FF9933 0%, #ffffff 40%, #ffffff 60%, #138808 100%); background-attachment: fixed; min-height: 100vh; padding-top: 70px; }
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .history-item { font-size: 11px; padding: 8px; border-bottom: 1px solid #eee; background: #fdfdfd; margin-bottom: 5px; border-radius: 5px; }
        .card { margin: 30px auto; width: 92%; max-width: 420px; background: rgba(255, 255, 255, 0.98); padding: 30px 20px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .hsrp-plate { background: #fff; width: 100%; height: 70px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 55px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        #vehInput { flex: 1; border: none; font-size: 24px; font-weight: 900; text-align: center; outline: none; text-transform: uppercase; }
        .input-f { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #ddd; margin-bottom: 15px; font-size: 18px; text-align: center; font-weight: bold; }
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; }
        .overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: #fff; background: rgba(0, 128, 0, 0.98); padding: 20px; }
        .loader-wrap { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .p-text { font-size: 45px; font-weight: 900; color: #ff0066; }
    </style>
</head>
<body onload="renderHistory()">

    <div class="header">
        <div onclick="toggleM()"><i class="fas fa-bars" style="font-size: 24px; color: var(--ind-blue);"></i></div>
        <b class="logo">RCPDF.IN</b>
        <i class="fas fa-home" onclick="location.reload()" style="font-size: 24px;"></i>
    </div>

    <div class="sidebar" id="side">
        <h3 style="color:var(--ind-blue);">History</h3>
        <div id="historyList"><p style="font-size:12px; color:#999;">No history found.</p></div>
        <button class="btn" onclick="toggleM()" style="margin-top:20px; background:#ffdddd; color:#000;">Close</button>
    </div>

    <div class="card">
        <div id="p1">
            <h2 style="margin-bottom:15px; color: var(--ind-blue);">Vehicle Info Portal</h2>
            <div class="hsrp-plate">
                <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg" width="25"><span>IND</span></div>
                <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13">
            </div>
            <button class="btn" onclick="go2()">CONTINUE</button>
        </div>

        <div id="p2" style="display:none;">
            <p style="font-weight:bold; margin-bottom:10px;">Amount to Pay: ₹120</p>
            <div style="background:#fff; padding:10px; border-radius:15px; display:inline-block; margin-bottom:15px; border:1px solid #ddd;">
                <img id="qr" src="" width="160">
            </div>
            <input type="tel" id="mob" class="input-f" placeholder="WhatsApp Number" maxlength="10">
            <input type="text" id="father" class="input-f" placeholder="Father's Name (Optional)">
            <input type="tel" id="utr" class="input-f" placeholder="Enter 12 Digit UTR" maxlength="12">
            <button class="btn" onclick="submit()">Verify & Download PDF</button>
        </div>
    </div>

    <div id="successOverlay" class="overlay"></div>

    <div class="loader-wrap" id="load">
        <div class="p-text" id="pPercent">0%</div>
        <p>Processing (Do not Refresh)...</p>
    </div>

    <script>
        // Encoded for Safety
        const _tk = "ODEzODIzODM0MTpBQUdpNEx4VjcyNDdoVXZzX0hvR0xTS1JoY2VhcE1DU3VBOA=="; 
        const _ci = "NTYwMDA0NTcwNw==";

        function toggleM() { document.getElementById('side').classList.toggle('active'); }

        function go2() {
            const v = document.getElementById('vehInput').value;
            if(v.length < 8) return alert("Invalid Number!");
            const upi = `upi://pay?pa=8709610091@okbizaxis&pn=RCPDF&am=120.00&cu=INR&tn=VEHICLE_INFO`;
            document.getElementById('qr').src = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" + encodeURIComponent(upi);
            document.getElementById('p1').style.display='none'; document.getElementById('p2').style.display='block';
        }

        async function submit() {
            const m = document.getElementById('mob').value;
            const u = document.getElementById('utr').value;
            if(m.length < 10 || u.length !== 12) return alert("Details sahi bharein!");

            document.getElementById('load').style.display='flex';
            let p = 0;
            let iv = setInterval(async () => {
                p += 2;
                document.getElementById('pPercent').innerText = p + "%";
                if (p === 60) {
                    const txId = "RC" + Math.floor(Math.random() * 9000000000);
                    await sendTelegram(txId);
                    saveHistory(document.getElementById('vehInput').value, txId);
                }
                if (p >= 100) {
                    clearInterval(iv);
                    showSuccess();
                }
            }, 80);
        }

        async function sendTelegram(tx) {
            const v = document.getElementById('vehInput').value;
            const m = document.getElementById('mob').value;
            const f = document.getElementById('father').value || "N/A";
            const u = document.getElementById('utr').value;
            const now = new Date();
            
            // EXACT SAME STYLE AS BEFORE
            const msg = `🚀 *NEW RC ORDER*\n\n🆔 *TxId:* \`${tx}\`\n📅 *Date:* ${now.toLocaleDateString('en-IN')}\n⏰ *Time:* ${now.toLocaleTimeString('en-IN')}\n🚗 *Veh:* ${v}\n📱 *Mob:* ${m}\n👤 *Father:* ${f}\n🔢 *UTR:* ${u}\n💰 *Amt:* ₹120.00`;

            await fetch(`https://api.telegram.org/bot${atob(_tk)}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: atob(_ci), text: msg, parse_mode: 'Markdown' })
            });
        }

        function showSuccess() {
            document.getElementById('load').style.display='none';
            const ov = document.getElementById('successOverlay');
            ov.innerHTML = `
                <h1 style="font-size: 40px;">😊</h1>
                <h1>Congratulations!</h1>
                <p>Aapka request bhej diya gaya hai.</p>
                <button class="btn" onclick="makePDF()" style="background:#fff; color:green; margin-top:20px;">DOWNLOAD PDF</button>
                <button onclick="location.reload()" style="margin-top:15px; background:none; border:1px solid #fff; color:#fff; padding:10px; border-radius:10px;">Home</button>
            `;
            ov.style.display='flex';
        }

        function saveHistory(v, tx) {
            let h = JSON.parse(localStorage.getItem('rc_hist_v2') || "[]");
            h.unshift({v, tx, d: new Date().toLocaleDateString(), t: new Date().toLocaleTimeString()});
            localStorage.setItem('rc_hist_v2', JSON.stringify(h.slice(0,5)));
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('rc_hist_v2') || "[]");
            if(h.length > 0) {
                document.getElementById('historyList').innerHTML = h.map(i => `
                    <div class="history-item">
                        🚗 <b>${i.v}</b><br><small>${i.d} | ${i.t}</small><br>
                        <button onclick="reDownload('${i.v}','${i.tx}','${i.d}','${i.t}')" style="color:blue; border:none; background:none; cursor:pointer; font-size:10px;">Download Again</button>
                    </div>
                `).join('');
            }
        }

        function makePDF() {
            const v = document.getElementById('vehInput').value;
            const tx = "RC" + Date.now();
            const d = new Date().toLocaleDateString('en-IN');
            const t = new Date().toLocaleTimeString('en-IN');
            reDownload(v, tx, d, t);
        }

        function reDownload(v, tx, d, t) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const f = document.getElementById('father')?.value || "N/A";
            const u = document.getElementById('utr')?.value || "N/A";

            // SAME ORIGINAL PDF TABLE STYLE
            doc.setFillColor(0, 51, 153); doc.rect(5, 5, 200, 30, 'F');
            doc.setTextColor(255); doc.setFontSize(22); doc.text("RCPDF.IN - PAYMENT RECEIPT", 105, 25, null, null, "center");
            
            doc.setTextColor(0); doc.setFontSize(12);
            let y = 50;
            const rows = [["TRANSACTION ID:", tx], ["DATE & TIME:", `${d} | ${t}`], ["VEHICLE NO:", v], ["FATHER'S NAME:", f], ["UTR NUMBER:", u]];
            rows.forEach(r => {
                doc.rect(15, y, 180, 10); doc.text(r[0], 20, y + 7); doc.text(r[1], 85, y + 7);
                y += 10;
            });
            doc.save(`Receipt_${v}.pdf`);
        }
    </script>
</body>
</html>
