<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCPDF.IN - Digital Document & Insurance Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff0066; --ind-blue: #003399; --green: #138808; --orange: #FF9933; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background: linear-gradient(180deg, var(--orange) 0%, #ffffff 40%, #ffffff 60%, var(--green) 100%);
            background-attachment: fixed; color: #000; overflow-x: hidden; min-height: 100vh;
        }

        /* Header & Sidebar */
        .header { position: fixed; top: 0; width: 100%; background: #fff; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; height: 60px; border-bottom: 3px solid var(--ind-blue); }
        .logo { color: var(--ind-blue); font-weight: 900; font-size: 22px; text-decoration: none; position: absolute; left: 50%; transform: translateX(-50%); }
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #fff; transition: 0.4s; z-index: 2000; padding: 80px 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); overflow-y: auto; }
        .sidebar.active { left: 0; }

        /* Main Card */
        .card { margin: 100px auto 20px; width: 92%; max-width: 450px; background: rgba(255, 255, 255, 0.98); padding: 25px; border-radius: 25px; text-align: center; border: 2px solid var(--ind-blue); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* Insurance Integrated Portal (Modal Style) */
        .ins-modal { position: fixed; inset: 0; background: #fff; z-index: 4000; display: none; flex-direction: column; overflow-y: auto; padding-bottom: 30px; }
        .ins-modal.active { display: flex; }
        .ins-header { position: sticky; top: 0; background: var(--ind-blue); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .ins-body { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }

        /* Forms UI */
        .form-group { margin-bottom: 18px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; font-size: 14px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px; font-size: 16px; font-weight: bold; outline: none; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--ind-blue); background: #f0f7ff; }

        .hsrp-plate { background: #fff; width: 100%; height: 75px; border: 2px solid #000; border-radius: 12px; display: flex; align-items: center; overflow: hidden; margin-bottom: 15px; position: relative; }
        .ind-strip { background: var(--ind-blue); width: 60px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold; position: absolute; left: 0; }
        #vehInput, #insVehicleNo { padding-left: 70px; font-size: 24px; text-align: center; border: none; }

        /* Tiles */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .tile { background: #fff; border: 2px solid #eee; border-radius: 12px; padding: 15px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .tile:active { transform: scale(0.95); background: #f9f9f9; border-color: var(--ind-blue); }
        .tile i { font-size: 22px; color: var(--ind-blue); }
        .tile span { font-size: 12px; font-weight: bold; }

        .hidden { display: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--ind-blue); color: #fff; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }

        /* Loader */
        .loader-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .road { width: 80%; height: 4px; background: #333; position: relative; margin-bottom: 20px; }
        .car { position: absolute; bottom: 0; left: 0; font-size: 40px; transition: 0.1s; }

        /* PDF Area (Hidden) */
        #invoice-area { display: none; padding: 30px; font-family: Arial; }
    </style>
</head>
<body>

    <div class="header">
        <div onclick="document.getElementById('side').classList.toggle('active')" style="cursor:pointer; font-size:20px; color:var(--ind-blue);"><i class="fas fa-bars"></i></div>
        <b class="logo">RCPDF.IN</b>
        <div onclick="location.reload()" style="cursor:pointer; font-size:20px;"><i class="fas fa-home"></i></div>
    </div>

    <div class="sidebar" id="side">
        <h3>History Log</h3>
        <div id="historyList" style="font-size:12px; color:#666; margin-top:10px;">Empty...</div>
        <hr style="margin:20px 0;">
        <button class="btn" onclick="document.getElementById('side').classList.remove('active')" style="background:#eee; color:#333;">Close</button>
    </div>

    <div class="card" id="mainCard">
        <button class="btn" onclick="toggleModal('insModal')" style="background: linear-gradient(45deg, var(--ind-blue), #0055ff); margin-bottom: 20px;">
            <i class="fas fa-shield-alt"></i> CHECK VEHICLE INSURANCE
        </button>

        <h2 style="margin-bottom:15px; color:var(--ind-blue);">RC Verification</h2>
        <div class="hsrp-plate">
            <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg" width="25"><br>IND</div>
            <input type="text" id="vehInput" placeholder="BR-09-AB-1234" maxlength="13" oninput="this.value=this.value.toUpperCase()">
        </div>
        <button class="btn" onclick="openPayment()">VERIFY RC DETAILS</button>

        <div class="info-grid">
            <div class="tile" onclick="alert('Support: 918709610091')"><i class="fas fa-headset"></i><span>SUPPORT</span></div>
            <div class="tile" onclick="alert('Verified Information Portal')"><i class="fas fa-check-circle"></i><span>TRUSTED</span></div>
            <div class="tile" onclick="alert('Non-refundable service fees.')"><i class="fas fa-undo"></i><span>REFUND</span></div>
            <div class="tile" onclick="alert('Digital Copy Generated.')"><i class="fas fa-file-pdf"></i><span>RECEIPT</span></div>
        </div>
    </div>

    <div class="ins-modal" id="insModal">
        <div class="ins-header">
            <b>🛡️ APEX INSURANCE PORTAL</b>
            <i class="fas fa-times" onclick="toggleModal('insModal')" style="cursor:pointer; font-size:22px;"></i>
        </div>
        <div class="ins-body">
            <div class="form-group">
                <label>Vehicle Registration Number</label>
                <div class="hsrp-plate" style="border-color:var(--ind-blue);">
                    <div class="ind-strip"><img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Flag_of_India.svg" width="25"><br>IND</div>
                    <input type="text" id="insVehicleNo" placeholder="BR-09-XX-XXXX" oninput="this.value=this.value.toUpperCase()">
                </div>
            </div>

            <div class="form-group">
                <label>Vehicle Category</label>
                <select id="vType" onchange="loadBrands()">
                    <option value="">Select Category</option>
                    <option value="Bike">Bike (2 Wheeler)</option>
                    <option value="PrivateCar">Private Car</option>
                    <option value="Commercial">Commercial (Truck/Pickup)</option>
                </select>
            </div>

            <div class="form-group hidden" id="brandGroup">
                <label>Brand / Company</label>
                <select id="brandSelect" onchange="loadModels()">
                    <option value="">Select Brand</option>
                </select>
            </div>

            <div class="form-group hidden" id="modelGroup">
                <label>Model & Engine (CC)</label>
                <select id="modelSelect">
                    <option value="">Select Model</option>
                </select>
            </div>

            <div class="form-group">
                <label>Policy Type</label>
                <select id="insType">
                    <option value="Third Party">Third Party Only</option>
                    <option value="Comprehensive">Comprehensive (Full)</option>
                </select>
            </div>

            <button class="btn" onclick="submitInsurance()" style="background:var(--green);">
                <i class="fas fa-paper-plane"></i> SUBMIT & GET QUOTATION
            </button>
        </div>
    </div>

    <div class="loader-wrap" id="loader">
        <div class="road"><div class="car" id="carIcon">🚗</div></div>
        <div id="pText" style="font-weight:bold; font-size:24px;">0%</div>
        <p>Processing Data...</p>
    </div>

    <script>
        const T_TOKEN = "8138238341:AAGi4LxV7247hUvs_HoGLSKRhkcEapMCSuA";
        const T_CHAT_ID = "5600045707";

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('active');
        }

        // Insurance Data
        const insuranceData = {
            Bike: { "Hero": ["Splendor (100cc)", "Glamour (125cc)"], "Honda": ["Activa (110cc)", "Shine (125cc)"], "Bajaj": ["Pulsar (150cc)", "Platina (100cc)"] },
            PrivateCar: { "Maruti": ["Swift (1200cc)", "Alto (800cc)"], "Hyundai": ["Creta (1500cc)", "i20 (1200cc)"] }
        };

        function loadBrands() {
            let cat = document.getElementById('vType').value;
            let brandSel = document.getElementById('brandSelect');
            brandSel.innerHTML = '<option value="">Select Brand</option>';
            if(insuranceData[cat]) {
                Object.keys(insuranceData[cat]).forEach(b => {
                    brandSel.innerHTML += `<option value="${b}">${b}</option>`;
                });
                document.getElementById('brandGroup').classList.remove('hidden');
            }
        }

        function loadModels() {
            let cat = document.getElementById('vType').value;
            let brand = document.getElementById('brandSelect').value;
            let modelSel = document.getElementById('modelSelect');
            modelSel.innerHTML = '<option value="">Select Model</option>';
            if(insuranceData[cat][brand]) {
                insuranceData[cat][brand].forEach(m => {
                    modelSel.innerHTML += `<option value="${m}">${m}</option>`;
                });
                document.getElementById('modelGroup').classList.remove('hidden');
            }
        }

        async function submitInsurance() {
            let v = document.getElementById('insVehicleNo').value;
            let cat = document.getElementById('vType').value;
            let type = document.getElementById('insType').value;
            let model = document.getElementById('modelSelect').value;

            if(!v || !model) { alert("Please fill all details"); return; }

            document.getElementById('loader').style.display = 'flex';
            let msg = `🛡️ *NEW INSURANCE REQUEST*\n🚗 *Veh:* ${v}\n📁 *Cat:* ${cat}\n📝 *Type:* ${type}\n🚘 *Model:* ${model}`;
            
            await fetch(`https://api.telegram.org/bot${T_TOKEN}/sendMessage?chat_id=${T_CHAT_ID}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                alert("Insurance Request Submitted Successfully! We will contact you on WhatsApp.");
                toggleModal('insModal');
            }, 2000);
        }

        // Payment & RC Logic
        function openPayment() {
            let v = document.getElementById('vehInput').value;
            if(v.length < 9) { alert("Invalid Vehicle Number"); return; }
            alert("Redirecting to Secure Payment Gateway...");
            // Yahan aap apna Payment Function call kar sakte hain
        }
    </script>
</body>
</html>
