<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCPDF.IN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{
background:linear-gradient(-45deg,#ff0066,#005BAC,#00c6ff,#00ff99);
background-size:400% 400%;
animation:bg 8s infinite;
display:flex;flex-direction:column;align-items:center;color:#fff;
}
@keyframes bg{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}

.topbar{
position:fixed;top:0;width:100%;
background:#fff;padding:10px;
display:flex;justify-content:space-between;align-items:center;
}

.menu-icon div{width:22px;height:3px;background:#ff0066;margin:4px 0}

.homeBtn{
background:#ff0066;color:#fff;
padding:2px 6px;font-size:10px;border-radius:5px;
}

/* VEHICLE INPUT */
.vehicleBox{
display:flex;
align-items:center;
background:#fff;
border-radius:8px;
margin-top:10px;
overflow:hidden;
}

.ind{
background:#003399;
color:#fff;
padding:6px 6px;
font-size:11px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
gap:3px;
}

/* Chakra icon */
.ind svg{
width:12px;
height:12px;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:14px;
text-transform:uppercase;
}

/* बाकी same */
.sideMenu{position:fixed;right:-260px;top:0;width:250px;height:100%;background:#fff;padding-top:80px;transition:0.3s}
.sideMenu button{width:90%;margin:10px 5%;padding:12px;background:#ff0066;color:#fff;border:none;border-radius:8px}
.openMenu{right:0}

.card{margin-top:100px;background:rgba(255,255,255,0.2);padding:20px;border-radius:15px;width:90%;max-width:400px;text-align:center}

button{
width:100%;padding:12px;margin-top:10px;
background:#000;color:#fff;border:none;border-radius:8px;
box-shadow:0 5px 0 #333;
}
button:active{transform:translateY(3px);box-shadow:0 2px 0 #333}

.qr{width:200px;margin-top:10px}

.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:none;flex-direction:column;justify-content:center;align-items:center}
.barBox{width:80%;height:25px;background:#ddd;border-radius:20px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#ff0066,#00ff99,#005BAC)}
#percent{color:#000;margin-top:10px}
.msg{color:#000}

.footer{margin-top:40px}

.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;color:#000;padding:20px;border-radius:10px;display:none}
</style>
</head>

<body>

<div class="topbar">
<div class="menu-icon" onclick="menu.classList.toggle('openMenu')">
<div></div><div></div><div></div>
</div>
<button class="homeBtn" onclick="location.reload()">🏠</button>
</div>

<div class="sideMenu" id="menu">
<button onclick="window.location.href='https://insurancebju.blogspot.com/2025/11/blog-post_17.html?m=1'">Insurance</button>
<button>About</button>
<button>Disclaimer</button>
<button onclick="window.location.href='https://t.me/yourtelegramusername'">Contact</button>
</div>

<div class="card">

<div id="page1">

<h3>Enter Your Vehicle Number</h3>

<div class="vehicleBox">
<div class="ind">

<!-- Chakra SVG -->
<svg viewBox="0 0 24 24" fill="white">
<circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" fill="none"/>
<path d="M12 2 L12 22 M2 12 L22 12 M5 5 L19 19 M19 5 L5 19" stroke="white" stroke-width="1"/>
</svg>

IND
</div>

<input id="vehicle" placeholder="BR-09-AB-1234" oninput="formatVehicle(this)">
</div>

<button onclick="goNext()">Continue</button>

</div>

</div>

</body>
</html>
